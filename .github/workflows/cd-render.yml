name: ShopFlow CD — Deploy to Render

on:
  workflow_run:
    workflows: ["ShopFlow CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:  # Allow manual deployment

jobs:
  deploy-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
          
      - name: Build Application JAR
        run: ./mvnw clean package -DskipTests -Pproduction
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true
          
      - name: Extract Version from POM
        id: version
        run: |
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/shopflow:latest
            ${{ secrets.DOCKER_USERNAME }}/shopflow:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/shopflow:${{ steps.version.outputs.short_sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/shopflow:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/shopflow:buildcache,mode=max
        continue-on-error: true

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    environment:
      name: production
      url: ${{ vars.RENDER_APP_URL }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build Production JAR
        run: ./mvnw clean package -DskipTests -Pproduction

      - name: Deploy to Render
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'

      - name: Wait for Deployment
        run: sleep 30

      - name: Verify Deployment Health
        run: |
          echo "Checking application health..."
          curl --fail --retry 5 --retry-delay 10 \
            "https://${{ vars.RENDER_APP_URL }}/actuator/health" \
            && echo "✅ ShopFlow deployed successfully to Render!" \
            || echo "⚠️ Health check failed — check Render dashboard"
        continue-on-error: true

      - name: Notify Success
        if: success()
        run: echo "✅ Deployment completed successfully!"

      - name: Notify Failure
        if: failure()
        run: echo "❌ Deployment failed — check logs above"
