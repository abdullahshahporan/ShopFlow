name: Continuous Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/shopflow
  
jobs:
  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: []  # Can add CI workflow as dependency if needed
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Build Application JAR
        run: ./mvnw clean package -DskipTests
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Extract Version from POM
        id: version
        run: |
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.short_sha }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max
          
      - name: Docker Image Digest
        run: echo "Image pushed with digest ${{ steps.docker_build.outputs.digest }}"
        
  deploy-production:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: build-docker
    environment:
      name: production
      url: https://shopflow.example.com
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          
      - name: Deploy to Production
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          ssh ${{ env.SSH_USERNAME }}@${{ env.SSH_HOST }} << 'EOF'
            # Navigate to application directory
            cd ~/shopflow || exit 1
            
            # Pull latest docker-compose configuration
            git pull origin main
            
            # Pull latest Docker image
            docker pull ${{ env.DOCKER_IMAGE }}:latest
            
            # Stop existing containers
            docker-compose down
            
            # Export environment variables for docker-compose
            export DB_HOST=${{ env.DB_HOST }}
            export DB_NAME=${{ env.DB_NAME }}
            export DB_USERNAME=${{ env.DB_USERNAME }}
            export DB_PASSWORD=${{ env.DB_PASSWORD }}
            
            # Start services with new image
            docker-compose up -d
            
            # Wait for application to be ready
            echo "Waiting for application to start..."
            sleep 15
            
            # Check if container is running
            docker ps | grep shopflow-app
            
            # Cleanup old images
            docker image prune -f
          EOF
          
      - name: Health Check
        run: |
          echo "Performing health check..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.SSH_HOST }}:8080/actuator/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Application is healthy!"
              exit 0
            fi
            echo "⏳ Attempt $i/10: HTTP $STATUS - Waiting for application..."
            sleep 10
          done
          echo "❌ Health check failed after 10 attempts"
          exit 1
          
      - name: Rollback on Failure
        if: failure()
        run: |
          ssh ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ~/shopflow
            echo "❌ Deployment failed, rolling back..."
            docker-compose down
            # Pull previous stable image (add tagging strategy)
            docker pull ${{ env.DOCKER_IMAGE }}:stable
            docker tag ${{ env.DOCKER_IMAGE }}:stable ${{ env.DOCKER_IMAGE }}:latest
            docker-compose up -d
          EOF
          
      - name: Slack Notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Deployment to Production: ${{ job.status }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
