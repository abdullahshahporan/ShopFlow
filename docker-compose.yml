version: '3.8'

services:
  # ===================================
  # PostgreSQL Database
  # ===================================
  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-shopflow-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-shopflow}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    networks:
      - shopflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================================
  # ShopFlow Application
  # ===================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_USERNAME:-shopflow}/shopflow:${DOCKER_IMAGE_TAG:-latest}
    container_name: ${APP_CONTAINER_NAME:-shopflow-app}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database Configuration
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-shopflow}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-changeme}
      
      # Application Configuration
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8080
      
      # JPA/Hibernate Configuration
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SHOW_SQL:-false}
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: ${FORMAT_SQL:-false}
      
      # Security Configuration
      JWT_SECRET: ${JWT_SECRET:-default_secret_change_in_production}
      SESSION_TIMEOUT: ${SESSION_TIMEOUT:-3600}
      
      # Logging Configuration
      LOGGING_LEVEL_ROOT: ${LOG_LEVEL:-INFO}
      LOGGING_FILE_PATH: ${LOG_FILE_PATH:-/app/logs/shopflow.log}
      
      # Payment Gateway Configuration (if needed)
      BKASH_API_KEY: ${BKASH_API_KEY:-}
      NAGAD_MERCHANT_ID: ${NAGAD_MERCHANT_ID:-}
      
      # Application Metadata
      SPRING_APPLICATION_NAME: ShopFlow
      TZ: ${TIMEZONE:-Asia/Dhaka}
      
    ports:
      - "${APP_EXTERNAL_PORT:-8080}:8080"
    volumes:
      - app_logs:/app/logs
      - app_uploads:/app/uploads
    networks:
      - shopflow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===================================
  # Adminer (Database Management UI)
  # ===================================
  adminer:
    image: adminer:latest
    container_name: ${ADMINER_CONTAINER_NAME:-shopflow-adminer}
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    ports:
      - "${ADMINER_EXTERNAL_PORT:-8081}:8080"
    networks:
      - shopflow-network

  # ===================================
  # Redis (Optional - for caching/sessions)
  # ===================================
  # redis:
  #   image: redis:7-alpine
  #   container_name: shopflow-redis
  #   restart: unless-stopped
  #   command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
  #   ports:
  #     - "${REDIS_EXTERNAL_PORT:-6379}:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - shopflow-network
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ===================================
  # Nginx (Optional - reverse proxy)
  # ===================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: shopflow-nginx
  #   restart: unless-stopped
  #   depends_on:
  #     - app
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #   networks:
  #     - shopflow-network

# ===================================
# Networks
# ===================================
networks:
  shopflow-network:
    driver: bridge
    name: shopflow-network

# ===================================
# Volumes
# ===================================
volumes:
  postgres_data:
    driver: local
    name: shopflow-postgres-data
  app_logs:
    driver: local
    name: shopflow-app-logs
  app_uploads:
    driver: local
    name: shopflow-app-uploads
  # redis_data:
  #   driver: local
  #   name: shopflow-redis-data
