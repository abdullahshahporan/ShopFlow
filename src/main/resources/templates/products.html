<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Store Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; }
        main { flex: 1; }
    </style>
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="py-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2><i class="bi bi-grid"></i> Product Catalog</h2>
            <a class="btn btn-outline-primary" sec:authorize="hasRole('SELLER')" th:href="@{/seller/products}">Manage My Products</a>
        </div>
        <hr>

        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <div class="table-responsive" th:if="${products != null and !products.isEmpty()}">
            <table class="table table-striped align-middle">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>SKU</th>
                    <th>Seller</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.name}"></td>
                    <td th:text="${product.sku}"></td>
                    <td th:text="${product.sellerName}"></td>
                    <td th:text="${#numbers.formatDecimal(product.price, 1, 2)}"></td>
                    <td th:text="${product.quantity}"></td>
                    <td>
                        <a class="btn btn-sm btn-primary" sec:authorize="hasRole('BUYER')" th:href="@{/buyer/orders/new}">Order Now</a>
                        <a class="btn btn-sm btn-outline-secondary" sec:authorize="isAnonymous()" th:href="@{/login}">Login to Order</a>
                        <a class="btn btn-sm btn-outline-dark" sec:authorize="hasRole('SELLER')" th:href="@{/seller/products}">My Products</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="alert alert-info" th:if="${products == null or products.isEmpty()}">
            No active products are available right now.
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
