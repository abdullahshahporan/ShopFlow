<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | ShopFlow</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body class="public-layout">
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="d-flex align-items-center justify-content-center py-5">
        <div class="card" style="max-width: 420px; width: 100%; border-radius: 16px;">
            <div class="card-body" style="padding: 32px;">
                <div class="text-center mb-4">
                    <i class="bi bi-box-arrow-in-right" style="font-size: 32px; color: var(--primary);"></i>
                    <h2 style="margin-top: 16px; margin-bottom: 8px;">Welcome Back</h2>
                    <p class="text-muted" style="margin-bottom: 0;">Sign in to your ShopFlow account</p>
                </div>

                <div th:if="${param.error}" class="alert-modern alert-danger-modern">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span>Invalid email or password.</span>
                </div>
                <div th:if="${param.logout}" class="alert-modern alert-success-modern">
                    <i class="bi bi-check-circle-fill"></i>
                    <span>You have been logged out successfully.</span>
                </div>
                <div th:if="${param.registered}" class="alert-modern alert-success-modern">
                    <i class="bi bi-check-circle-fill"></i>
                    <span>Account created! Please sign in.</span>
                </div>

                <form th:action="@{/login}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background: white; border: 1px solid var(--border);"><i class="bi bi-envelope" style="color: var(--text-muted);"></i></span>
                            <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required style="border-left: 0;">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background: white; border: 1px solid var(--border);"><i class="bi bi-lock" style="color: var(--text-muted);"></i></span>
                            <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required style="border-left: 0;">
                        </div>
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" id="remember" name="remember">
                        <label class="form-check-label" for="remember" style="font-weight: 400; color: var(--text-muted); font-size: 14px;">Remember me</label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100" style="padding: 10px; font-weight: 600;">
                        <i class="bi bi-box-arrow-right"></i> Sign In
                    </button>
                </form>

                <hr style="margin: 20px 0; border-color: var(--border);">

                <p class="text-center" style="margin-bottom: 0; font-size: 14px;">
                    Don't have an account?
                    <a th:href="@{/register}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create one now</a>
                </p>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-dismiss alerts after 4 seconds
        document.querySelectorAll('.alert-modern').forEach(alert => {
            setTimeout(() => {
                alert.style.opacity = '0';
                alert.style.transform = 'translateY(-10px)';
                setTimeout(() => alert.remove(), 300);
            }, 4000);
        });
    </script>
</body>
</html>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
