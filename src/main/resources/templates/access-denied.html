<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied | ShopFlow</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body class="public-layout">
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="d-flex align-items-center justify-content-center" style="padding: 40px 20px;">
        <div style="text-align: center; max-width: 500px;">
            <i class="bi bi-shield-exclamation" style="font-size: 64px; color: var(--danger); margin-bottom: 16px; display: block;"></i>
            <h1 style="font-size: 48px; color: var(--text-muted); margin: 0 0 16px 0;">403</h1>
            <h2 style="font-size: 28px; margin-bottom: 12px;">Access Denied</h2>
            <p class="text-muted" style="font-size: 15px; margin-bottom: 32px;">You don't have permission to access this page. If you believe this is an error, please contact support.</p>
            <div style="display: flex; gap: 12px; justify-content: center;">
                <a th:href="@{/}" class="btn btn-primary">
                    <i class="bi bi-house-door"></i> Go Home
                </a>
                <a th:href="@{/profile}" class="btn btn-secondary">
                    <i class="bi bi-person-circle"></i> My Profile
                </a>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
