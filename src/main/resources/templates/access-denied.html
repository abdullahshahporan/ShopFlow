<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    <title>Access Denied | ShopFlow</title>
</head>
<body>
    <nav th:replace="~{fragments/navbar :: publicNavbar}"></nav>

    <main class="d-flex align-items-center justify-content-center" style="min-height: 70vh; padding: 40px 20px;">
        <div class="sf-empty-state" style="max-width: 600px;">
            <div class="sf-empty-icon" style="color: var(--sf-danger);">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h1 style="font-size: 3rem; color: var(--sf-muted); margin: 0 0 1rem 0; font-weight: 700;">403</h1>
            <h2 style="margin-bottom: 1rem;">Access Denied</h2>
            <p>You don't have permission to access this page. If you believe this is an error, please contact support.</p>
            <div class="mt-4" style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                <a th:href="@{/}" class="btn sf-btn-primary">
                    <i class="fas fa-home"></i> Go Home
                </a>
                <a th:href="@{/profile}" class="btn sf-btn-secondary">
                    <i class="fas fa-user"></i> My Profile
                </a>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script th:src="@{/js/shopflow.js}"></script>
</body>
</html>
