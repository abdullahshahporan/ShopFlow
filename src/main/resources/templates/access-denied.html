<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied | Store Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; background: #f4f6f9; }
        main { flex: 1; }
    </style>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="d-flex align-items-center">
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <i class="bi bi-shield-x display-1 text-danger"></i>
                <h1 class="mt-3">403 - Access Denied</h1>
                <p class="lead text-muted">You do not have permission to access this page.</p>
                <a th:href="@{/}" class="btn btn-primary">
                    <i class="bi bi-house"></i> Go Home
                </a>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
