<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History | ShopFlow</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body class="sidebar-layout">
<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
<div class="sidebar-content">
    <div th:replace="~{fragments/topbar :: topbar('Order History')}"></div>
    <main>
        <div class="alert-modern alert-success-modern" th:if="${successMessage}">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${successMessage}"></span>
        </div>
        <div class="alert-modern alert-danger-modern" th:if="${errorMessage}">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px;">
            <div class="stat-card">
                <div class="stat-icon bg-indigo-soft">
                    <i class="bi bi-bag-check"></i>
                </div>
                <div>
                    <div class="stat-value" th:text="${sellerOrderCount}">0</div>
                    <div class="stat-label">Orders Received</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-indigo-soft">
                    <i class="bi bi-cash-stack"></i>
                </div>
                <div>
                    <div class="stat-value" th:text="${'BDT ' + #numbers.formatDecimal(sellerRevenue, 1, 'COMMA', 2, 'POINT')}">BDT 0.00</div>
                    <div class="stat-label">Total Revenue</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h3 style="margin-bottom: 20px;">Seller Order History</h3>

                <div th:if="${sellerOrders != null and !sellerOrders.isEmpty()}" class="table-responsive">
                    <table class="table">
                        <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Date</th>
                            <th>Buyer</th>
                            <th>Units</th>
                            <th>Payment</th>
                            <th>Revenue</th>
                            <th>Status</th>
                            <th>Update</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="order : ${sellerOrders}">
                            <td><strong>#<span th:text="${order.orderId}"></span></strong></td>
                            <td th:text="${order.createdAt != null ? #temporals.format(order.createdAt, 'MMM dd, yyyy') : '-'}"></td>
                            <td th:text="${order.buyerName}"></td>
                            <td th:text="${order.totalUnits}"></td>
                            <td>
                                <div th:text="${order.paymentMethod}"></div>
                                <small class="text-muted" th:text="${order.paymentStatus}"></small>
                            </td>
                            <td><strong th:text="${'BDT ' + #numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 2, 'POINT')}"></strong></td>
                            <td><span class="badge badge-warning" style="background: #FEF3C7; color: #92400E;" th:text="${order.status}"></span></td>
                            <td>
                                <form th:action="@{/seller/orders/{orderId}/status(orderId=${order.orderId})}" method="post" style="display: flex; gap: 8px; align-items: center;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <select name="status" class="form-select form-select-sm" style="min-width: 150px;">
                                        <option value="PENDING" th:selected="${order.status == 'PENDING'}">Pending</option>
                                        <option value="APPROVED" th:selected="${order.status == 'APPROVED'}">Approved</option>
                                        <option value="ON_THE_WAY" th:selected="${order.status == 'ON_THE_WAY'}">On The Way</option>
                                        <option value="DELIVERED" th:selected="${order.status == 'DELIVERED'}">Delivered</option>
                                    </select>
                                    <button type="submit" class="btn btn-outline-primary btn-sm">Update</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div th:if="${sellerOrders == null or sellerOrders.isEmpty()}" class="empty-state">
                    <i class="bi bi-bag-x"></i>
                    <h5>No Orders Yet</h5>
                    <p class="text-muted">Orders containing your products will appear here.</p>
                </div>
            </div>
        </div>
    </main>
    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
