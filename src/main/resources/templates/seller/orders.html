<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management | ShopFlow Seller</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body>
    <!-- Sidebar -->
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

    <!-- Main Content -->
    <div class="sf-main-content">
        <!-- Navbar -->
        <nav th:replace="~{fragments/navbar :: navbar(pageTitle='Order Management')}"></nav>

        <!-- Page Content -->
        <div class="sf-page-content">
            <!-- Page Header -->
            <div class="sf-page-header">
                <div>
                    <h1 class="sf-page-title"><i class="fas fa-shopping-cart"></i> Order Management</h1>
                    <p class="sf-page-subtitle">Track and manage customer orders</p>
                </div>
            </div>
            <!-- Alert Messages -->
            <div th:replace="~{fragments/sidebar :: alerts}"></div>

            <!-- Stats Cards -->
            <div class="row g-3 mb-4">
                <div class="col-lg-6 col-md-6">
                    <div class="sf-stat-card">
                        <div class="sf-stat-icon" style="background: linear-gradient(135deg, var(--sf-primary) 0%, #8b7cff 100%);">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <div class="sf-stat-content">
                            <div class="sf-stat-label">Orders Received</div>
                            <div class="sf-stat-value" th:text="${sellerOrderCount}">0</div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6 col-md-6">
                    <div class="sf-stat-card">
                        <div class="sf-stat-icon" style="background: linear-gradient(135deg, var(--sf-success) 0%, #4ade80 100%);">
                            <i class="fas fa-dollar-sign"></i>
                        </div>
                        <div class="sf-stat-content">
                            <div class="sf-stat-label">Total Revenue</div>
                            <div class="sf-stat-value" th:text="${'BDT ' + #numbers.formatDecimal(sellerRevenue, 1, 'COMMA', 2, 'POINT')}">BDT 0.00</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Orders Table -->
            <div class="sf-card">
                <div class="sf-card-header">
                    <h5 class="sf-card-title">
                        <i class="fas fa-list"></i> Order History
                    </h5>
                </div>
                <div class="sf-card-body">
                    <!-- Table -->
                    <div th:if="${sellerOrders != null and !sellerOrders.isEmpty()}" class="sf-table-container">
                        <table class="sf-table">
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Date</th>
                                    <th>Buyer</th>
                                    <th>Quantity</th>
                                    <th>Payment</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="order : ${sellerOrders}">
                                    <td>
                                        <strong class="text-primary">#<span th:text="${order.orderId}"></span></strong>
                                    </td>
                                    <td>
                                        <small class="text-muted" th:text="${order.createdAt != null ? #temporals.format(order.createdAt, 'MMM dd, yyyy') : '-'}">-</small>
                                    </td>
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <div class="sf-avatar-circle me-2">
                                                <i class="fas fa-user"></i>
                                            </div>
                                            <span th:text="${order.buyerName}">Buyer</span>
                                        </div>
                                    </td>
                                    <td>
                                        <span class="sf-badge sf-badge-info" th:text="${order.totalUnits} + ' units'">0 units</span>
                                    </td>
                                    <td>
                                        <div>
                                            <strong th:text="${order.paymentMethod}">COD</strong>
                                            <br>
                                            <small class="text-muted" th:text="${order.paymentStatus}">PENDING</small>
                                        </div>
                                    </td>
                                    <td>
                                        <strong th:text="${'BDT ' + #numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 2, 'POINT')}">BDT 0.00</strong>
                                    </td>
                                    <td>
                                        <span class="sf-badge"
                                              th:classappend="${order.status == 'PENDING' ? ' sf-badge-warning' :
                                                              order.status == 'APPROVED' ? ' sf-badge-info' :
                                                              order.status == 'ON_THE_WAY' ? ' sf-badge-primary' :
                                                              order.status == 'DELIVERED' ? ' sf-badge-success' : ' sf-badge-secondary'}"
                                              th:text="${order.status}">Status</span>
                                    </td>
                                    <td class="text-end">
                                        <form th:action="@{/seller/orders/{orderId}/status(orderId=${order.orderId})}" 
                                              method="post" class="d-flex gap-2 align-items-center justify-content-end">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                            <select name="status" class="form-select form-select-sm" style="width: auto; min-width: 140px;">
                                                <option value="PENDING" th:selected="${order.status == 'PENDING'}">Pending</option>
                                                <option value="APPROVED" th:selected="${order.status == 'APPROVED'}">Approved</option>
                                                <option value="ON_THE_WAY" th:selected="${order.status == 'ON_THE_WAY'}">On The Way</option>
                                                <option value="DELIVERED" th:selected="${order.status == 'DELIVERED'}">Delivered</option>
                                            </select>
                                            <button type="submit" class="btn btn-sm sf-btn-primary">
                                                <i class="fas fa-check"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Empty State -->
                    <div th:if="${sellerOrders == null or sellerOrders.isEmpty()}" class="sf-empty-state">
                        <div class="sf-empty-icon">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <h5 class="sf-empty-title">No Orders Yet</h5>
                        <p class="sf-empty-text">Orders containing your products will appear here.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <!-- Scripts -->
    <script th:src="@{/js/shopflow.js}"></script>
</body>
</html>
