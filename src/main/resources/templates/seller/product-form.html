<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Edit Product' : 'Create Product'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="py-4">
    <div class="container" style="max-width: 720px;">
        <h2 th:text="${isEdit} ? 'Edit Product' : 'Create Product'"></h2>
        <hr>

        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form th:action="${isEdit} ? @{'/seller/products/' + ${productId}} : @{/seller/products}"
              method="post"
              th:object="${productRequestDto}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="mb-3">
                <label class="form-label" for="name">Name</label>
                <input class="form-control" id="name" type="text" th:field="*{name}" required>
                <div class="text-danger small" th:errors="*{name}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="sku">SKU</label>
                <input class="form-control" id="sku" type="text" th:field="*{sku}" required>
                <div class="text-danger small" th:errors="*{sku}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="price">Price</label>
                <input class="form-control" id="price" type="number" step="0.01" min="0.01" th:field="*{price}" required>
                <div class="text-danger small" th:errors="*{price}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="quantity">Quantity</label>
                <input class="form-control" id="quantity" type="number" min="0" th:field="*{quantity}" required>
                <div class="text-danger small" th:errors="*{quantity}"></div>
            </div>

            <div class="form-check mb-3" th:if="${isEdit}">
                <input class="form-check-input" id="active" type="checkbox" th:field="*{active}">
                <label class="form-check-label" for="active">Active</label>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-primary" type="submit" th:text="${isEdit} ? 'Update' : 'Create'"></button>
                <a class="btn btn-secondary" th:href="@{/seller/products}">Cancel</a>
            </div>
        </form>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
