<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Edit Product | ShopFlow' : 'Create Product | ShopFlow'"></title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body class="sidebar-layout">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <div class="sidebar-content">
        <div th:replace="~{fragments/topbar :: topbar(${isEdit} ? 'Edit Product' : 'Create Product')}"></div>
        <main>
            <div class="alert-modern alert-danger-modern" th:if="${errorMessage}">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <div class="card" style="max-width: 680px;">
                <div class="card-body">
                    <h3 style="margin-bottom: 24px;" th:text="${isEdit} ? 'Edit Product Details' : 'Add New Product'"></h3>

                    <form th:action="${isEdit} ? @{'/seller/products/' + ${productId}} : @{/seller/products}" method="post" th:object="${productRequestDto}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <!-- Product Information Section -->
                        <div style="margin-bottom: 24px;">
                            <h6 style="text-transform: uppercase; font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; margin-bottom: 16px;">Product Information</h6>

                            <div class="mb-3">
                                <label for="name" class="form-label">Product Name <span style="color: var(--danger);">*</span></label>
                                <input type="text" class="form-control" id="name" th:field="*{name}" placeholder="e.g., Wireless Headphones" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="sku" class="form-label">SKU <span style="color: var(--danger);">*</span></label>
                                <input type="text" class="form-control" id="sku" th:field="*{sku}" placeholder="e.g., WH-001" required>
                                <small class="text-muted" style="display: block; margin-top: 6px;">Unique identifier for this product</small>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('sku')}" th:errors="*{sku}"></div>
                            </div>
                        </div>

                        <!-- Pricing & Inventory Section -->
                        <div style="margin-bottom: 24px; padding-top: 16px; border-top: 1px solid var(--border);">
                            <h6 style="text-transform: uppercase; font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; margin-bottom: 16px;">Pricing & Inventory</h6>

                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                                <div>
                                    <label for="price" class="form-label">Price (USD) <span style="color: var(--danger);">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text" style="background: white; border: 1px solid var(--border);">$</span>
                                        <input type="number" class="form-control" id="price" th:field="*{price}" step="0.01" min="0.01" placeholder="0.00" required style="border-left: 0;">
                                    </div>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                                </div>

                                <div>
                                    <label for="quantity" class="form-label">Initial Stock <span style="color: var(--danger);">*</span></label>
                                    <div class="input-group">
                                        <input type="number" class="form-control" id="quantity" th:field="*{quantity}" min="0" placeholder="0" required>
                                        <span class="input-group-text" style="background: white; border: 1px solid var(--border);">units</span>
                                    </div>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Status Section (Edit Only) -->
                        <div th:if="${isEdit}" style="margin-bottom: 24px; padding-top: 16px; border-top: 1px solid var(--border);">
                            <h6 style="text-transform: uppercase; font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; margin-bottom: 16px;">Status</h6>
                            <div class="form-check form-switch">
                                <input type="checkbox" class="form-check-input" id="active" th:field="*{active}">
                                <label class="form-check-label" for="active" style="font-weight: 400;">Product is active and visible to buyers</label>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div style="display: flex; gap: 12px; padding-top: 16px; border-top: 1px solid var(--border);">
                            <a th:href="@{/seller/products}" class="btn btn-secondary" style="min-width: 100px;">Cancel</a>
                            <button type="submit" class="btn btn-primary" style="min-width: 100px;" th:text="${isEdit} ? 'Update Product' : 'Create Product'"></button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-dismiss alerts
        document.querySelectorAll('.alert-modern').forEach(alert => {
            setTimeout(() => {
                alert.style.opacity = '0';
                setTimeout(() => alert.remove(), 300);
            }, 4000);
        });
    </script>
</body>
</html>
