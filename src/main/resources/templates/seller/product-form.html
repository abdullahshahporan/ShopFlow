<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Edit Product | ShopFlow' : 'Create Product | ShopFlow'"></title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body>
    <!-- Sidebar -->
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

    <!-- Main Content -->
    <div class="sf-main-content">
        <!-- Navbar -->
        <nav th:replace="~{fragments/navbar :: navbar(pageTitle=${isEdit} ? 'Edit Product' : 'Add Product')}"></nav>

        <!-- Page Content -->
        <div class="sf-page-content">
            <!-- Page Header -->
            <div class="sf-page-header">
                <div>
                    <h1 class="sf-page-title">
                        <i th:class="${isEdit} ? 'fas fa-edit' : 'fas fa-plus-circle'"></i> 
                        <span th:text="${isEdit} ? 'Edit Product' : 'Add New Product'"></span>
                    </h1>
                    <p class="sf-page-subtitle" th:text="${isEdit} ? 'Update product details' : 'Create a new product in your inventory'"></p>
                </div>
            </div>
            <!-- Alert Messages -->
            <div th:replace="~{fragments/sidebar :: alerts}"></div>

            <!-- Form Card -->
            <div class="sf-card" style="max-width: 800px;">
                <div class="sf-card-header">
                    <h5 class="sf-card-title">
                        <i class="fas fa-box"></i> Product Details
                    </h5>
                </div>
                <div class="sf-card-body">

                    <form th:action="${isEdit} ? @{'/seller/products/' + ${productId}} : @{/seller/products}" method="post" th:object="${productRequestDto}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <!-- Product Information -->
                        <div class="mb-4">
                            <h6 class="text-uppercase text-muted mb-3" style="font-size: 0.75rem; letter-spacing: 0.05em;">
                                <i class="fas fa-info-circle"></i> Product Information
                            </h6>

                            <div class="row g-3">
                                <div class="col-md-8">
                                    <label for="name" class="form-label">Product Name <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control sf-form-control" id="name" th:field="*{name}" 
                                           placeholder="e.g., Wireless Headphones" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                                </div>

                                <div class="col-md-4">
                                    <label for="sku" class="form-label">SKU <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control sf-form-control" id="sku" th:field="*{sku}" 
                                           placeholder="WH-001" required>
                                    <small class="form-text text-muted">Unique product code</small>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('sku')}" th:errors="*{sku}"></div>
                                </div>

                                <div class="col-md-12">
                                    <label for="imageUrl" class="form-label">
                                        <i class="fas fa-image"></i> Product Image URL
                                    </label>
                                    <input type="url" class="form-control sf-form-control" id="imageUrl" th:field="*{imageUrl}" 
                                           placeholder="https://images.unsplash.com/photo-...">
                                    <small class="form-text text-muted">
                                        <i class="fas fa-info-circle"></i> Paste a direct image URL from Unsplash, Picsum, or any CDN. Leave blank for placeholder.
                                    </small>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('imageUrl')}" th:errors="*{imageUrl}"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Pricing & Inventory -->
                        <div class="mb-4 pt-4 border-top">
                            <h6 class="text-uppercase text-muted mb-3" style="font-size: 0.75rem; letter-spacing: 0.05em;">
                                <i class="fas fa-dollar-sign"></i> Pricing & Stock
                            </h6>

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="price" class="form-label">Price (BDT) <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-taka-sign"></i></span>
                                        <input type="number" class="form-control sf-form-control" id="price" th:field="*{price}" 
                                               step="0.01" min="0.01" placeholder="0.00" required>
                                    </div>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                                </div>

                                <div class="col-md-6">
                                    <label for="quantity" class="form-label">Stock Quantity <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <input type="number" class="form-control sf-form-control" id="quantity" th:field="*{quantity}" 
                                               min="0" placeholder="0" required>
                                        <span class="input-group-text">units</span>
                                    </div>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Status (Edit Mode) -->
                        <div th:if="${isEdit}" class="mb-4 pt-4 border-top">
                            <h6 class="text-uppercase text-muted mb-3" style="font-size: 0.75rem; letter-spacing: 0.05em;">
                                <i class="fas fa-toggle-on"></i> Status
                            </h6>
                            <div class="form-check form-switch">
                                <input type="checkbox" class="form-check-input" id="active" th:field="*{active}" style="width: 3rem; height: 1.5rem;">
                                <label class="form-check-label" for="active" style="margin-left: 0.5rem;">
                                    <strong>Product is active</strong>
                                    <small class="d-block text-muted">When enabled, this product will be visible to buyers</small>
                                </label>
                            </div>
                        </div>

                        <!-- Form Actions -->
                        <div class="d-flex gap-2 pt-4 border-top">
                            <a th:href="@{/seller/products}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                            <button type="submit" class="btn sf-btn-primary">
                                <i th:class="${isEdit} ? 'fas fa-save' : 'fas fa-plus-circle'"></i>
                                <span th:text="${isEdit} ? 'Update Product' : 'Create Product'"></span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
    <script th:src="@{/js/shopflow.js}"></script>
</body>
</html>
