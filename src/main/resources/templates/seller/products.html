<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Products | Store Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; }
        main { flex: 1; }
    </style>
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="py-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2><i class="bi bi-box-seam"></i> Seller - My Products</h2>
            <a class="btn btn-primary" th:href="@{/seller/products/new}"><i class="bi bi-plus-circle"></i> Create Product</a>
        </div>
        <hr>
        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <div class="table-responsive" th:if="${products != null and !products.isEmpty()}">
            <table class="table table-striped align-middle">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>SKU</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.name}"></td>
                    <td th:text="${product.sku}"></td>
                    <td th:text="${#numbers.formatDecimal(product.price, 1, 2)}"></td>
                    <td th:text="${product.quantity}"></td>
                    <td>
                        <span class="badge bg-success" th:if="${product.active}">Active</span>
                        <span class="badge bg-secondary" th:unless="${product.active}">Inactive</span>
                    </td>
                    <td>
                        <a class="btn btn-sm btn-outline-primary" th:href="@{'/seller/products/' + ${product.id} + '/edit'}">Edit</a>
                        <form class="d-inline" th:action="@{'/seller/products/' + ${product.id} + '/delete'}" method="post"
                              onsubmit="return confirm('Are you sure you want to delete this product?');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="alert alert-info" th:if="${products == null or products.isEmpty()}">No products found.</div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
