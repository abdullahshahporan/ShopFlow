<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | ShopFlow</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="sf-card">
                    <div class="sf-card-body text-center" style="padding: 48px 24px;">
                        <div class="mb-4">
                            <i class="fas fa-exclamation-triangle" style="font-size: 72px; color: var(--sf-danger);"></i>
                        </div>
                        <h1 class="mb-3" style="font-size: 32px; font-weight: 700;" th:text="${status} ?: '500'">500</h1>
                        <h4 class="mb-3" th:text="${error} ?: 'Internal Server Error'">Internal Server Error</h4>
                        <p class="text-muted mb-4" th:text="${message} ?: 'An unexpected error occurred. Please try again later.'">
                            An unexpected error occurred. Please try again later.
                        </p>
                        <div class="mb-4">
                            <small class="text-muted">
                                <i class="fas fa-link"></i> <span th:text="${path}"></span><br>
                                <i class="fas fa-clock"></i> <span th:text="${timestamp}"></span>
                            </small>
                        </div>
                        <div class="d-flex gap-2 justify-content-center">
                            <a href="javascript:history.back()" class="btn sf-btn-secondary">
                                <i class="fas fa-arrow-left"></i> Go Back
                            </a>
                            <a th:href="@{/}" class="btn sf-btn-primary">
                                <i class="fas fa-home"></i> Go Home
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
