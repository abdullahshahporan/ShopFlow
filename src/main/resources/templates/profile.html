<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | ShopFlow</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body>
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <div class="sf-main-content">
        <nav th:replace="~{fragments/navbar :: navbar(pageTitle='My Profile')}"></nav>
        <div class="sf-page-content">
            <!-- Alert Messages -->
            <div th:if="${profileSuccessMessage}" class="sf-alert sf-alert-success sf-alert-dismissible">
                <i class="fas fa-check-circle"></i>
                <span th:text="${profileSuccessMessage}"></span>
            </div>
            <div th:if="${profileErrorMessage}" class="sf-alert sf-alert-danger sf-alert-dismissible">
                <i class="fas fa-exclamation-triangle"></i>
                <span th:text="${profileErrorMessage}"></span>
            </div>
            <div th:if="${passwordSuccessMessage}" class="sf-alert sf-alert-success sf-alert-dismissible">
                <i class="fas fa-check-circle"></i>
                <span th:text="${passwordSuccessMessage}"></span>
            </div>
            <div th:if="${passwordErrorMessage}" class="sf-alert sf-alert-danger sf-alert-dismissible">
                <i class="fas fa-exclamation-triangle"></i>
                <span th:text="${passwordErrorMessage}"></span>
            </div>

            <!-- Profile Header -->
            <div class="row g-3 mb-4">
                <div class="col-lg-8">
                    <div class="sf-card" style="background: linear-gradient(135deg, var(--sf-primary) 0%, #8b5cf6 100%); border: none;">
                        <div class="sf-card-body" style="padding: 40px; display: flex; align-items: center; gap: 24px;">
                            <div class="sf-avatar-circle" style="width: 88px; height: 88px; font-size: 32px; background: rgba(255,255,255,0.25); color: white; box-shadow: 0 8px 20px rgba(0,0,0,0.15);"
                                 th:text="${#strings.toUpperCase(#strings.substring(profileUser.name, 0, 1))}">U</div>
                            <div style="flex: 1;">
                                <h2 style="margin-bottom: 8px; color: white; font-size: 28px; font-weight: 700;" th:text="${profileUser.name}">User Name</h2>
                                <p style="margin-bottom: 12px; color: rgba(255,255,255,0.9); font-size: 15px;" th:text="${profileUser.email}">user@example.com</p>
                                <div>
                                    <span class="sf-badge" style="background: rgba(255,255,255,0.95); color: var(--sf-primary); padding: 6px 12px; font-size: 13px; font-weight: 600;" th:text="${roleLabel}">Buyer</span>
                                    <span class="sf-badge sf-badge-success" style="padding: 6px 12px; font-size: 13px; font-weight: 600; margin-left: 8px;" th:if="${profileUser.enabled}">
                                        <i class="fas fa-check-circle"></i> Active Account
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="sf-card h-100" style="background: linear-gradient(135deg, var(--sf-gray-50) 0%, var(--sf-gray-100) 100%);">
                        <div class="sf-card-body" style="padding: 32px; display: flex; flex-direction: column; justify-content: center;">
                            <div style="margin-bottom: 20px;">
                                <small class="text-muted" style="font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;">Member Since</small>
                                <h3 style="margin: 4px 0 0; font-size: 18px; font-weight: 700;" th:text="${profileUser.createdAt != null ? #temporals.format(profileUser.createdAt, 'MMM dd, yyyy') : '-'}">-</h3>
                            </div>
                            <div style="margin-bottom: 20px;">
                                <small class="text-muted" style="font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;" th:text="${profileMetricOneLabel}">Orders Placed</small>
                                <h3 style="margin: 4px 0 0; font-size: 24px; font-weight: 700; color: var(--sf-primary);" th:text="${profileMetricOneValue}">0</h3>
                            </div>
                            <div style="margin-bottom: 24px;">
                                <small class="text-muted" style="font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;" th:text="${profileMetricTwoLabel}">Total Spent</small>
                                <h3 style="margin: 4px 0 0; font-size: 24px; font-weight: 700; color: var(--sf-success);" th:text="'BDT ' + ${#numbers.formatDecimal(profileMetricTwoValue, 1, 2)}">BDT 0.00</h3>
                            </div>
                            <a th:href="@{${dashboardUrl}}" class="btn sf-btn-primary" style="width: 100%;">
                                <i class="fas fa-tachometer-alt"></i>
                                <span th:text="${dashboardLabel}">Dashboard</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Forms Section -->
            <div class="row g-3">
                <div class="col-lg-7">
                    <div class="sf-card h-100">
                        <div class="sf-card-header">
                            <h5 class="sf-card-title"><i class="fas fa-user-edit"></i> Edit Profile</h5>
                            <p class="text-muted" style="margin: 4px 0 0; font-size: 14px;">Update your personal information</p>
                        </div>
                        <div class="sf-card-body">
                            <form th:action="@{/profile/update}" method="post" th:object="${profileUpdateRequest}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                                <div class="mb-3">
                                    <label for="name" class="form-label">Full Name</label>
                                    <input type="text" id="name" class="form-control sf-form-control" th:field="*{name}" placeholder="Your full name" required>
                                </div>

                                <div class="mb-3">
                                    <label for="email" class="form-label">Email Address</label>
                                    <input type="email" id="email" class="form-control sf-form-control" th:value="${profileUser.email}" readonly disabled style="background: var(--sf-gray-50); cursor: not-allowed;">
                                    <small class="text-muted" style="display: block; margin-top: 6px;">
                                        <i class="fas fa-info-circle"></i> Email cannot be changed from this page.
                                    </small>
                                </div>

                                <div class="row g-3 mb-4">
                                    <div class="col-md-6">
                                        <label class="form-label">Role</label>
                                        <div class="form-control sf-form-control" style="background: var(--sf-gray-50); display: flex; align-items: center; gap: 8px;" th:text="${roleLabel}">Buyer</div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Account Status</label>
                                        <div class="form-control sf-form-control" style="background: var(--sf-gray-50);" th:text="${profileUser.enabled ? 'Enabled ✓' : 'Disabled'}">Enabled</div>
                                    </div>
                                </div>

                                <button type="submit" class="btn sf-btn-primary">
                                    <i class="fas fa-check"></i>
                                    Save Profile Changes
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-lg-5">
                    <div class="sf-card h-100">
                        <div class="sf-card-header">
                            <h5 class="sf-card-title"><i class="fas fa-lock"></i> Change Password</h5>
                            <p class="text-muted" style="margin: 4px 0 0; font-size: 14px;">Keep your account secure</p>
                        </div>
                        <div class="sf-card-body">
                            <form th:action="@{/profile/password}" method="post" th:object="${passwordUpdateRequest}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                                <div class="mb-3">
                                    <label for="currentPassword" class="form-label">Current Password</label>
                                    <input type="password" id="currentPassword" class="form-control sf-form-control" th:field="*{currentPassword}" required placeholder="Enter current password">
                                </div>

                                <div class="mb-3">
                                    <label for="newPassword" class="form-label">New Password</label>
                                    <input type="password" id="newPassword" class="form-control sf-form-control" th:field="*{newPassword}" minlength="6" required placeholder="Min. 6 characters">
                                    <small class="text-muted" style="display: block; margin-top: 4px;">
                                        <i class="fas fa-info-circle"></i> Must be at least 6 characters
                                    </small>
                                </div>

                                <div class="mb-4">
                                    <label for="confirmPassword" class="form-label">Confirm New Password</label>
                                    <input type="password" id="confirmPassword" class="form-control sf-form-control" th:field="*{confirmPassword}" minlength="6" required placeholder="Re-enter new password">
                                </div>

                                <button type="submit" class="btn sf-btn-primary w-100">
                                    <i class="fas fa-shield-alt"></i>
                                    Update Password
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/shopflow.js}"></script>
</body>
</html>
