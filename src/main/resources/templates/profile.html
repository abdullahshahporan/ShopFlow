<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | ShopFlow</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body class="sidebar-layout">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <div class="sidebar-content">
        <div th:replace="~{fragments/topbar :: topbar('My Profile')}"></div>
        <main>
            <div class="row g-3 mb-4">
                <div class="col-lg-8">
                    <div class="card">
                        <div class="card-body" style="padding: 32px; display: flex; align-items: center; gap: 20px;">
                            <div class="user-avatar" style="width: 72px; height: 72px; font-size: 24px;"
                                 th:text="${#strings.toUpperCase(#strings.substring(profileUser.name, 0, 1))}">U</div>
                            <div>
                                <h2 style="margin-bottom: 6px;" th:text="${profileUser.name}">User Name</h2>
                                <p class="text-muted" style="margin-bottom: 4px;" th:text="${profileUser.email}">user@example.com</p>
                                <span class="badge badge-info" th:text="${roleLabel}">Buyer</span>
                                <span class="badge badge-success" th:if="${profileUser.enabled}" style="margin-left: 8px;">Active Account</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card h-100">
                        <div class="card-body" style="padding: 32px; display: flex; flex-direction: column; justify-content: center;">
                            <small class="text-muted">Joined</small>
                            <h3 style="margin: 6px 0 14px;" th:text="${profileUser.createdAt != null ? #temporals.format(profileUser.createdAt, 'MMM dd, yyyy') : '-'}">-</h3>
                            <a th:href="@{${dashboardUrl}}" class="btn btn-primary">
                                <i class="bi bi-arrow-right-circle"></i>
                                <span th:text="${dashboardLabel}">Dashboard</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-body" style="padding: 32px;">
                    <h3 style="margin-bottom: 20px;">Profile Details</h3>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label>Full Name</label>
                            <div class="form-control" th:text="${profileUser.name}">User Name</div>
                        </div>
                        <div class="col-md-6">
                            <label>Email Address</label>
                            <div class="form-control" th:text="${profileUser.email}">user@example.com</div>
                        </div>
                        <div class="col-md-6">
                            <label>Role</label>
                            <div class="form-control" th:text="${roleLabel}">Buyer</div>
                        </div>
                        <div class="col-md-6">
                            <label>Status</label>
                            <div class="form-control" th:text="${profileUser.enabled ? 'Enabled' : 'Disabled'}">Enabled</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
