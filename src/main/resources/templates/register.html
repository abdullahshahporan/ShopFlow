<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | ShopFlow</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body class="public-layout">
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="d-flex align-items-center justify-content-center py-5">
        <div class="card" style="max-width: 420px; width: 100%; border-radius: 16px;">
            <div class="card-body" style="padding: 32px;">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus" style="font-size: 32px; color: var(--primary);"></i>
                    <h2 style="margin-top: 16px; margin-bottom: 8px;">Create Account</h2>
                    <p class="text-muted" style="margin-bottom: 0;">Join ShopFlow today</p>
                </div>

                <form th:action="@{/register}" method="post" th:object="${registerRequest}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background: white; border: 1px solid var(--border);"><i class="bi bi-person" style="color: var(--text-muted);"></i></span>
                            <input type="text" class="form-control" id="name" th:field="*{name}" placeholder="John Doe" required style="border-left: 0;">
                        </div>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background: white; border: 1px solid var(--border);"><i class="bi bi-envelope" style="color: var(--text-muted);"></i></span>
                            <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="you@example.com" required style="border-left: 0;">
                        </div>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background: white; border: 1px solid var(--border);"><i class="bi bi-lock" style="color: var(--text-muted);"></i></span>
                            <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Min 6 characters" required style="border-left: 0;">
                        </div>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>

                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background: white; border: 1px solid var(--border);"><i class="bi bi-lock-fill" style="color: var(--text-muted);"></i></span>
                            <input type="password" class="form-control" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Re-enter password" required style="border-left: 0;">
                        </div>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100" style="padding: 10px; font-weight: 600;">
                        <i class="bi bi-check-lg"></i> Create Account
                    </button>
                </form>

                <hr style="margin: 20px 0; border-color: var(--border);">

                <p class="text-center" style="margin-bottom: 0; font-size: 14px;">
                    Already have an account?
                    <a th:href="@{/login}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign in here</a>
                </p>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
