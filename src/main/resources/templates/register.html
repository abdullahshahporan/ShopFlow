<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' | ShopFlow' : 'Create Account | ShopFlow'}">Create Account | ShopFlow</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body>
    <div class="sf-auth-container">
        <!-- Left Side - Branding -->
        <div class="sf-auth-left">
            <div class="sf-auth-branding">
                <div class="sf-auth-logo">
                    <i class="fas fa-store"></i>
                </div>
                <h1 class="sf-auth-brand-title">ShopFlow</h1>
                <p class="sf-auth-tagline">
                    Join thousands of buyers and sellers in our modern e-commerce ecosystem.
                </p>
            </div>
        </div>

        <!-- Right Side - Register Form -->
        <div class="sf-auth-right">
            <div class="sf-auth-card fade-in-up">
                <div class="sf-auth-header">
                    <h2 class="sf-auth-title" th:text="${pageTitle != null ? pageTitle : 'Create Account'}">Create Account</h2>
                    <p class="sf-auth-description" th:text="${accountTypeDescription != null ? accountTypeDescription : 'Join ShopFlow today'}">Join ShopFlow today</p>
                </div>

                <!-- Alert Messages -->
                <div th:if="${accountType != null and accountType == 'SELLER'}" class="alert alert-info alert-dismissible fade show alert-autohide" role="alert">
                    <i class="fas fa-info-circle"></i>
                    <span>Seller accounts require admin approval before you can sign in.</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Register Form -->
                <form th:action="${accountType != null and accountType == 'SELLER'} ? @{/register/seller} : @{/register/buyer}" 
                      method="post" th:object="${registerRequest}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="sf-form-group">
                        <label for="name" class="sf-form-label">Full Name</label>
                        <input type="text" class="sf-form-control" id="name" th:field="*{name}" 
                               placeholder="John Doe" required th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                        <div class="sf-form-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>

                    <div class="sf-form-group">
                        <label for="email" class="sf-form-label">Email Address</label>
                        <input type="email" class="sf-form-control" id="email" th:field="*{email}" 
                               placeholder="you@example.com" required th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''">
                        <div class="sf-form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>

                    <div class="sf-form-group">
                        <label for="password" class="sf-form-label">Password</label>
                        <input type="password" class="sf-form-control" id="password" th:field="*{password}" 
                               placeholder="Minimum 6 characters" required th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''">
                        <div class="sf-form-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>

                    <div class="sf-form-group">
                        <label for="confirmPassword" class="sf-form-label">Confirm Password</label>
                        <input type="password" class="sf-form-control" id="confirmPassword" th:field="*{confirmPassword}" 
                               placeholder="Re-enter your password" required th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''">
                        <div class="sf-form-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                    </div>

                    <button type="submit" class="btn-sf-primary w-100" style="padding: 0.75rem; font-size: 1rem;">
                        <i class="fas fa-check-circle"></i>
                        <span th:text="${accountType != null and accountType == 'SELLER'} ? 'Submit Seller Request' : 'Create Buyer Account'">Create Account</span>
                    </button>
                </form>

                <!-- Divider -->
                <div class="sf-auth-divider">
                    <span>Already have an account?</span>
                </div>

                <!-- Login Link -->
                <a th:href="@{/login}" class="btn-sf-outline w-100" style="text-decoration: none; text-align: center;">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </a>

                <!-- Account Type Toggle -->
                <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #e5e7eb;">
                    <a th:href="@{/register/buyer}" 
                       th:style="${accountType == null or accountType != 'SELLER'} ? 'color: var(--sf-primary); font-weight: 600;' : 'color: var(--sf-text-secondary);'"
                       style="text-decoration: none; font-size: 0.9rem; transition: color 0.2s;">
                        <i class="fas fa-shopping-bag"></i> Buyer Signup
                    </a>
                    <span style="color: var(--sf-text-muted);">|</span>
                    <a th:href="@{/register/seller}" 
                       th:style="${accountType != null and accountType == 'SELLER'} ? 'color: var(--sf-primary); font-weight: 600;' : 'color: var(--sf-text-secondary);'"
                       style="text-decoration: none; font-size: 0.9rem; transition: color 0.2s;">
                        <i class="fas fa-store"></i> Seller Signup
                    </a>
                </div>

                <!-- Back to Home Link -->
                <div style="text-align: center; margin-top: 1rem;">
                    <a th:href="@{/}" style="color: var(--sf-text-secondary); text-decoration: none; font-size: 0.9rem;">
                        <i class="fas fa-arrow-left"></i> Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/shopflow.js}"></script>
</body>
</html>
