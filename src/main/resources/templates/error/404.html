<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    <title>Page Not Found | ShopFlow</title>
</head>
<body>
    <nav th:replace="~{fragments/navbar :: publicNavbar}"></nav>

    <main class="d-flex align-items-center justify-content-center" style="min-height: 70vh; padding: 40px 20px;">
        <div class="sf-empty-state" style="max-width: 600px;">
            <div class="sf-empty-icon" style="color: var(--sf-warning);">
                <i class="fas fa-search"></i>
            </div>
            <h1 style="font-size: 3rem; color: var(--sf-muted); margin: 0 0 1rem 0; font-weight: 700;">404</h1>
            <h2 style="margin-bottom: 1rem;">Page Not Found</h2>
            <p>The page you're looking for doesn't exist or has been moved. Please check the URL or return to the homepage.</p>
            <div class="mt-4" style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                <a th:href="@{/}" class="btn sf-btn-primary">
                    <i class="fas fa-home"></i> Go Home
                </a>
                <a href="javascript:history.back()" class="btn sf-btn-secondary-outline">
                    <i class="fas fa-arrow-left"></i> Go Back
                </a>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script th:src="@{/js/shopflow.js}"></script>
</body>
</html>
