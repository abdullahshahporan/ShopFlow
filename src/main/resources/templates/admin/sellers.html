<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Management | ShopFlow Admin</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body>
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <div class="sf-main-content">
        <nav th:replace="~{fragments/navbar :: navbar(pageTitle='Seller Management')}"></nav>
        <div class="sf-page-content">
            <div class="sf-page-header">
                <div>
                    <h1 class="sf-page-title"><i class="fas fa-store"></i> Seller Management</h1>
                    <p class="sf-page-subtitle">Approve and manage seller accounts</p>
                </div>
            </div>

            <div th:replace="~{fragments/sidebar :: alerts}"></div>

            <!-- Stats -->
            <div class="row g-3 mb-4">
                <div class="col-lg-4 col-md-6">
                    <div class="sf-stat-card">
                        <div class="sf-stat-icon" style="background: linear-gradient(135deg, var(--sf-success) 0%, #4ade80 100%);">
                            <i class="fas fa-store"></i>
                        </div>
                        <div class="sf-stat-content">
                            <div class="sf-stat-label">Total Sellers</div>
                            <div class="sf-stat-value" th:text="${totalSellerCount}">0</div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4 col-md-6">
                    <div class="sf-stat-card">
                        <div class="sf-stat-icon" style="background: linear-gradient(135deg, var(--sf-warning) 0%, #fbbf24 100%);">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="sf-stat-content">
                            <div class="sf-stat-label">Pending Approval</div>
                            <div class="sf-stat-value" th:text="${pendingSellerCount}">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sellers Table -->
            <div class="sf-card">
                <div class="sf-card-header">
                    <h5 class="sf-card-title"><i class="fas fa-list"></i> All Sellers</h5>
                </div>
                <div class="sf-card-body">
                    <div th:if="${sellers != null and not #lists.isEmpty(sellers)}" class="sf-table-container">
                        <table class="sf-table">
                            <thead>
                                <tr>
                                    <th>Seller</th>
                                    <th>Email</th>
                                    <th>Status</th>
                                    <th>Joined</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="seller : ${sellers}">
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <div class="sf-avatar-circle me-2"><i class="fas fa-store"></i></div>
                                            <strong th:text="${seller.name}">Name</strong>
                                        </div>
                                    </td>
                                    <td><span class="text-muted" th:text="${seller.email}">email@example.com</span></td>
                                    <td>
                                        <span th:if="${seller.enabled}" class="sf-badge sf-badge-success">
                                            <i class="fas fa-check-circle"></i> Active
                                        </span>
                                        <span th:if="${not seller.enabled}" class="sf-badge sf-badge-warning">
                                            <i class="fas fa-hourglass-half"></i> Pending
                                        </span>
                                    </td>
                                    <td>
                                        <small class="text-muted" th:text="${seller.createdAt != null ? #temporals.format(seller.createdAt, 'MMM dd, yyyy') : '-'}">-</small>
                                    </td>
                                    <td class="text-end">
                                        <form th:action="@{/admin/sellers/{id}/toggle(id=${seller.id})}" method="post" class="d-inline">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                            <button type="submit" class="btn btn-sm"
                                                    th:class="${seller.enabled} ? 'btn btn-sm sf-btn-danger-outline' : 'btn btn-sm sf-btn-success'"
                                                    th:title="${not seller.enabled} ? 'Approve this seller' : 'Disable seller'">
                                                <i th:class="${seller.enabled} ? 'fas fa-ban' : 'fas fa-check'"></i>
                                                <span th:text="${not seller.enabled} ? 'Approve' : 'Disable'">Action</span>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div th:if="${sellers == null or #lists.isEmpty(sellers)}" class="sf-empty-state">
                        <div class="sf-empty-icon"><i class="fas fa-store"></i></div>
                        <h5 class="sf-empty-title">No Sellers Found</h5>
                        <p class="sf-empty-text">There are no seller accounts in the system yet.</p>
                    </div>
                </div>
            </div>
        </div>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>
</body>
</html>
