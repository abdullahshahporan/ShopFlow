<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management | ShopFlow</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body class="sidebar-layout">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <div class="sidebar-content">
        <div th:replace="~{fragments/topbar :: topbar('User Management')}"></div>
        <main>
            <div class="alert-modern alert-success-modern" th:if="${successMessage}">
                <i class="bi bi-check-circle-fill"></i>
                <span th:text="${successMessage}"></span>
            </div>
            <div class="alert-modern alert-danger-modern" th:if="${errorMessage}">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <!-- Stat Cards -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px;">
                <div class="stat-card">
                    <div class="stat-icon bg-indigo-soft">
                        <i class="bi bi-people"></i>
                    </div>
                    <div>
                        <div class="stat-value" th:text="${users.size()}" th:unless="${users == null}">0</div>
                        <div class="stat-label">Total Users</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-indigo-soft">
                        <i class="bi bi-person-check"></i>
                    </div>
                    <div>
                        <div class="stat-value" th:text="${users?.stream().filter(u -> u.roleInt == 0).count()}" th:unless="${users == null}">0</div>
                        <div class="stat-label">Buyers</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-indigo-soft">
                        <i class="bi bi-shop"></i>
                    </div>
                    <div>
                        <div class="stat-value" th:text="${users?.stream().filter(u -> u.roleInt == 1).count()}" th:unless="${users == null}">0</div>
                        <div class="stat-label">Sellers</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-indigo-soft">
                        <i class="bi bi-shield-lock"></i>
                    </div>
                    <div>
                        <div class="stat-value" th:text="${users?.stream().filter(u -> u.roleInt == 2).count()}" th:unless="${users == null}">0</div>
                        <div class="stat-label">Admins</div>
                    </div>
                </div>
            </div>

            <!-- Users Table Card -->
            <div class="card">
                <div class="card-body">
                    <h3 style="margin-bottom: 24px;">Users</h3>

                    <div th:if="${users != null and !users.isEmpty()}" class="table-responsive">
                        <table class="table">
                            <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Joined</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="user : ${users}">
                                <td>
                                    <div style="display: flex; align-items: center; gap: 12px;">
                                        <div class="user-avatar" style="width: 32px; height: 32px; font-size: 12px;" th:text="${user.name.charAt(0).toUpperCase()}"></div>
                                        <strong th:text="${user.name}"></strong>
                                    </div>
                                </td>
                                <td><small th:text="${user.email}"></small></td>
                                <td>
                                    <form class="d-inline" th:action="@{'/admin/users/' + ${user.id} + '/role'}" method="post" style="display: flex; gap: 8px;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <select name="roleInt" class="form-select form-select-sm" style="width: 120px;">
                                            <option value="0" th:selected="${user.roleInt == 0}">BUYER</option>
                                            <option value="1" th:selected="${user.roleInt == 1}">SELLER</option>
                                            <option value="2" th:selected="${user.roleInt == 2}">ADMIN</option>
                                        </select>
                                        <button class="btn btn-outline-primary btn-sm" type="submit" style="min-width: 60px;">
                                            <i class="bi bi-check"></i>
                                        </button>
                                    </form>
                                </td>
                                <td>
                                    <span th:if="${user.enabled}" class="badge badge-success">Active</span>
                                    <span th:if="!${user.enabled}" class="badge" style="background: #FEE2E2; color: #991B1B;">Disabled</span>
                                </td>
                                <td><small th:text="${#temporals.format(user.createdAt, 'MMM dd')}"></small></td>
                                <td>
                                    <form th:if="${user.id != currentAdminId}" th:action="@{'/admin/users/' + ${user.id} + '/toggle'}" method="post" style="display: inline;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm" th:classappend="${user.enabled} ? 'btn-outline-danger' : 'btn-outline-success'" th:text="${user.enabled} ? 'Disable' : 'Enable'" style="min-width: 80px;"></button>
                                    </form>
                                    <small class="text-muted" th:if="${user.id == currentAdminId}">(Self)</small>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div th:if="${users == null or users.isEmpty()}" class="empty-state">
                        <i class="bi bi-people"></i>
                        <h5>No Users Found</h5>
                        <p class="text-muted">No users exist in the system yet.</p>
                    </div>
                </div>
            </div>
        </main>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-dismiss alerts
        document.querySelectorAll('.alert-modern').forEach(alert => {
            setTimeout(() => {
                alert.style.opacity = '0';
                setTimeout(() => alert.remove(), 300);
            }, 4000);
        });
    </script>
</body>
</html>
