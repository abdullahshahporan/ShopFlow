<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management | ShopFlow</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body class="sidebar-layout">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <div class="sidebar-content">
        <div th:replace="~{fragments/topbar :: topbar('User Management')}"></div>
        <main>
            <div class="alert alert-success" th:if="${successMessage != null}">
                <i class="bi bi-check-circle-fill"></i>
                <span th:text="${successMessage}"></span>
            </div>
            <div class="alert alert-danger" th:if="${errorMessage != null}">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-sm-6 col-xl-3">
                    <div class="card"><div class="card-body"><small class="text-muted">Total Users</small><h4 th:text="${users != null ? users.size() : 0}">0</h4></div></div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="card"><div class="card-body"><small class="text-muted">Buyers</small><h4 th:text="${buyerCount}">0</h4></div></div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="card"><div class="card-body"><small class="text-muted">Sellers</small><h4 th:text="${sellerCount}">0</h4></div></div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="card"><div class="card-body"><small class="text-muted">Admins</small><h4 th:text="${adminCount}">0</h4></div></div>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <h3 style="margin-bottom: 24px;">Users</h3>

                    <div th:if="${users != null and not #lists.isEmpty(users)}" class="table-responsive">
                        <table class="table table-striped align-middle">
                            <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Joined</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.name}">Name</td>
                                <td th:text="${user.email}">Email</td>
                                <td>
                                    <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post" class="d-flex gap-2">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <select name="roleInt" class="form-select form-select-sm" style="width: 120px;">
                                            <option value="0" th:selected="${user.roleInt == 0}">BUYER</option>
                                            <option value="1" th:selected="${user.roleInt == 1}">SELLER</option>
                                            <option value="2" th:selected="${user.roleInt == 2}">ADMIN</option>
                                        </select>
                                        <button class="btn btn-outline-primary btn-sm" type="submit">Save</button>
                                    </form>
                                </td>
                                <td>
                                    <span th:if="${user.enabled}" class="badge text-bg-success">Active</span>
                                    <span th:if="${not user.enabled}" class="badge text-bg-secondary">Disabled</span>
                                </td>
                                <td><small th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'MMM dd') : '-'}"></small></td>
                                <td>
                                    <form th:if="${user.id != currentAdminId}" th:action="@{/admin/users/{id}/toggle(id=${user.id})}" method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm"
                                                th:class="${user.enabled} ? 'btn btn-sm btn-outline-danger' : 'btn btn-sm btn-outline-success'"
                                                th:text="${user.enabled} ? 'Disable' : 'Enable'">Toggle</button>
                                    </form>
                                    <small class="text-muted" th:if="${user.id == currentAdminId}">(Self)</small>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div th:if="${users == null or #lists.isEmpty(users)}" class="empty-state">
                        <i class="bi bi-people"></i>
                        <h5>No Users Found</h5>
                        <p class="text-muted">No users exist in the system yet.</p>
                    </div>
                </div>
            </div>
        </main>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
