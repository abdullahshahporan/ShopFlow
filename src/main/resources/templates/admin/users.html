<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management | ShopFlow Admin</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body>
    <!-- Sidebar -->
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

    <!-- Main Content -->
    <div class="sf-main-content">
        <!-- Navbar -->
        <nav th:replace="~{fragments/navbar :: navbar(pageTitle='User Management')}"></nav>

        <!-- Page Content -->
        <div class="sf-page-content">
            <!-- Page Header -->
            <div class="sf-page-header">
                <div>
                    <h1 class="sf-page-title"><i class="fas fa-users-cog"></i> User Management</h1>
                    <p class="sf-page-subtitle">Manage buyers, sellers, and admin accounts</p>
                </div>
            </div>

            <!-- Alert Messages -->
            <div th:replace="~{fragments/sidebar :: alerts}"></div>

            <!-- Stats Cards -->
            <div class="row g-3 mb-4">
                <div class="col-lg-3 col-md-6">
                    <div class="sf-stat-card">
                        <div class="sf-stat-icon" style="background: linear-gradient(135deg, var(--sf-primary) 0%, #8b7cff 100%);">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="sf-stat-content">
                            <div class="sf-stat-label">Total Users</div>
                            <div class="sf-stat-value" th:text="${users != null ? users.size() : 0}">0</div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-3 col-md-6">
                    <div class="sf-stat-card">
                        <div class="sf-stat-icon" style="background: linear-gradient(135deg, var(--sf-accent) 0%, #38bdf8 100%);">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <div class="sf-stat-content">
                            <div class="sf-stat-label">Buyers</div>
                            <div class="sf-stat-value" th:text="${buyerCount}">0</div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-3 col-md-6">
                    <div class="sf-stat-card">
                        <div class="sf-stat-icon" style="background: linear-gradient(135deg, var(--sf-success) 0%, #4ade80 100%);">
                            <i class="fas fa-store"></i>
                        </div>
                        <div class="sf-stat-content">
                            <div class="sf-stat-label">Active Sellers</div>
                            <div class="sf-stat-value" th:text="${sellerCount}">0</div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-3 col-md-6">
                    <div class="sf-stat-card">
                        <div class="sf-stat-icon" style="background: linear-gradient(135deg, var(--sf-warning) 0%, #fbbf24 100%);">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="sf-stat-content">
                            <div class="sf-stat-label">Pending Sellers</div>
                            <div class="sf-stat-value" th:text="${pendingSellerCount}">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Users Table -->
            <div class="sf-card">
                <div class="sf-card-header">
                    <h5 class="sf-card-title">
                        <i class="fas fa-list"></i> All Users
                    </h5>
                </div>
                <div class="sf-card-body">
                    <!-- Table -->
                    <div th:if="${users != null and not #lists.isEmpty(users)}" class="sf-table-container">
                        <table class="sf-table">
                            <thead>
                                <tr>
                                    <th>User</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th>Joined</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="user : ${users}">
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <div class="sf-avatar-circle me-2">
                                                <i class="fas fa-user"></i>
                                            </div>
                                            <strong th:text="${user.name}">Name</strong>
                                        </div>
                                    </td>
                                    <td>
                                        <span class="text-muted" th:text="${user.email}">email@example.com</span>
                                    </td>
                                    <td>
                                        <span class="sf-badge sf-badge-primary" th:if="${user.roleInt == 1}">
                                            <i class="fas fa-store"></i> Seller
                                        </span>
                                        <span class="sf-badge sf-badge-info" th:if="${user.roleInt == 0}">
                                            <i class="fas fa-shopping-bag"></i> Buyer
                                        </span>
                                        <span class="sf-badge sf-badge-danger" th:if="${user.roleInt == 2}">
                                            <i class="fas fa-user-shield"></i> Admin
                                        </span>
                                    </td>
                                    <td>
                                        <span th:if="${user.enabled}" class="sf-badge sf-badge-success">
                                            <i class="fas fa-check-circle"></i> Active
                                        </span>
                                        <span th:if="${not user.enabled and user.roleInt == 1}" class="sf-badge sf-badge-warning">
                                            <i class="fas fa-hourglass-half"></i> Pending
                                        </span>
                                        <span th:if="${not user.enabled and user.roleInt != 1}" class="sf-badge sf-badge-secondary">
                                            <i class="fas fa-ban"></i> Disabled
                                        </span>
                                    </td>
                                    <td>
                                        <small class="text-muted" th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'MMM dd, yyyy') : '-'}">-</small>
                                    </td>
                                    <td class="text-end">
                                        <form th:if="${user.roleInt == 1}" th:action="@{/admin/users/{id}/toggle(id=${user.id})}" method="post" class="d-inline">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                            <button type="submit" 
                                                    class="btn btn-sm"
                                                    th:class="${user.enabled} ? 'btn btn-sm sf-btn-danger-outline' : 'btn btn-sm sf-btn-success'"
                                                    th:title="${not user.enabled} ? 'Approve this seller' : 'Disable seller'">
                                                <i th:class="${user.enabled} ? 'fas fa-ban' : 'fas fa-check'"></i>
                                                <span th:text="${not user.enabled} ? 'Approve' : 'Disable'">Action</span>
                                            </button>
                                        </form>
                                        <span th:if="${user.roleInt != 1}" class="text-muted small">—</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Empty State -->
                    <div th:if="${users == null or #lists.isEmpty(users)}" class="sf-empty-state">
                        <div class="sf-empty-icon">
                            <i class="fas fa-users"></i>
                        </div>
                        <h5 class="sf-empty-title">No Users Found</h5>
                        <p class="sf-empty-text">There are no users in the system yet.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <script th:src="@{/js/bootstrap.bundle.min.js}" src="/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/shopflow.js}" src="/js/shopflow.js"></script>
</body>
</html>
