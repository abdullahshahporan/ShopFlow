<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ShopFlow - Modern Retail Store Inventory Management System">
    <meta name="author" content="ShopFlow">
    
    <!-- Google Fonts - Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Custom ShopFlow CSS -->
    <link th:href="@{/css/shopflow.css}" rel="stylesheet">
</head>
<body>
    <!-- Footer Fragment -->
    <footer th:fragment="footer" style="background: var(--sf-navy); color: white; padding: 2rem 0; margin-top: 3rem;">
        <div class="container" style="max-width: 1200px; margin: 0 auto; padding: 0 1.5rem;">
            <div class="text-center">
                <p style="margin: 0; font-size: 0.9rem; opacity: 0.8;">
                    &copy; 2026 ShopFlow - Retail Store Inventory Management System. All rights reserved.
                </p>
            </div>
        </div>
    </footer>
    
    <!-- Bootstrap 5.3 Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom ShopFlow JavaScript -->
    <script th:src="@{/js/shopflow.js}"></script>
</body>
</html>
