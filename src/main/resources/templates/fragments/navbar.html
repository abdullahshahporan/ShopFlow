<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav class="navbar navbar-expand-lg border-bottom" th:fragment="navbar" style="background: white; padding: 16px 0;">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}" style="font-weight: 700; color: #4F46E5; font-size: 18px;">
            <i class="bi bi-shop"></i> ShopFlow
        </a>
        <div class="d-flex align-items-center ms-auto" sec:authorize="isAuthenticated()">
            <small sec:authentication="name" style="color: #111827; font-size: 13px; margin-right: 8px;"></small>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-primary btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
