<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!-- Modern Dashboard Navbar (with sidebar) -->
<nav class="sf-navbar" th:fragment="navbar">
    <div class="sf-navbar-left">
        <button class="sf-navbar-toggle" id="sidebarToggle">
            <i class="fas fa-bars"></i>
        </button>
        <h2 class="sf-navbar-title" th:text="${pageTitle != null ? pageTitle : 'Dashboard'}">Dashboard</h2>
    </div>
    
    <div class="sf-navbar-right">
        <!-- User Dropdown -->
        <div class="sf-dropdown" sec:authorize="isAuthenticated()">
            <div class="sf-navbar-user" data-dropdown-toggle>
                <div class="sf-navbar-avatar" sec:authentication="name" th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">U</div>
                <div class="sf-navbar-user-info">
                    <div class="sf-navbar-username" sec:authentication="name">User</div>
                    <div class="sf-navbar-userrole" sec:authorize="hasRole('ADMIN')">Admin</div>
                    <div class="sf-navbar-userrole" sec:authorize="hasRole('SELLER')">Seller</div>
                    <div class="sf-navbar-userrole" sec:authorize="hasRole('BUYER')">Buyer</div>
                </div>
                <i class="fas fa-chevron-down" style="font-size: 0.75rem; color: var(--sf-text-secondary);"></i>
            </div>
            <div class="sf-dropdown-menu">
                <div class="sf-dropdown-header">
                    <div style="font-weight: 600; color: var(--sf-navy);" sec:authentication="name">User</div>
                    <div style="font-size: 0.8125rem; color: var(--sf-text-secondary);">
                        <span sec:authorize="hasRole('ADMIN')">Admin</span>
                        <span sec:authorize="hasRole('SELLER')">Seller</span>
                        <span sec:authorize="hasRole('BUYER')">Buyer</span>
                    </div>
                </div>
                <a th:href="@{/profile}" class="sf-dropdown-item">
                    <i class="fas fa-user-circle"></i> Profile
                </a>
                <a sec:authorize="hasRole('BUYER')" th:href="@{/buyer/orders}" class="sf-dropdown-item">
                    <i class="fas fa-box-open"></i> My Orders
                </a>
                <a sec:authorize="hasRole('BUYER')" th:href="@{/buyer/cart}" class="sf-dropdown-item">
                    <i class="fas fa-shopping-cart"></i> Shopping Cart
                </a>
                <div style="border-top: 1px solid #e5e7eb; margin: 0.5rem 0;"></div>
                <form th:action="@{/logout}" method="post" style="margin: 0;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="sf-dropdown-item" style="width: 100%; text-align: left;">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<!-- Public Navbar (no sidebar - for home, products, login, register) -->
<nav class="sf-public-navbar" th:fragment="publicNavbar">
    <div class="container">
        <a class="sf-public-brand" th:href="@{/}">
            <i class="fas fa-store"></i>
            ShopFlow
        </a>
        
        <div class="sf-public-nav">
            <a class="sf-public-nav-link" th:href="@{/}">
                <i class="fas fa-home"></i> Home
            </a>
            <a class="sf-public-nav-link" th:href="@{/products}">
                <i class="fas fa-shopping-bag"></i> Products
            </a>
            
            <!-- Not Authenticated -->
            <div sec:authorize="!isAuthenticated()" style="display: flex; gap: 0.75rem;">
                <a th:href="@{/login}" class="btn-sf-outline" style="padding: 0.5rem 1.25rem; font-size: 0.875rem;">
                    <i class="fas fa-sign-in-alt"></i> Login
                </a>
                <a th:href="@{/register}" class="btn-sf-primary" style="padding: 0.5rem 1.25rem; font-size: 0.875rem; text-decoration: none;">
                    <i class="fas fa-user-plus"></i> Register
                </a>
            </div>
            
            <!-- Authenticated User -->
            <div sec:authorize="isAuthenticated()" class="sf-dropdown">
                <div class="sf-navbar-user" data-dropdown-toggle style="cursor: pointer;">
                    <div class="sf-navbar-avatar" sec:authentication="name" th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">U</div>
                    <div class="sf-navbar-username" sec:authentication="name" style="color: var(--sf-navy);">User</div>
                    <i class="fas fa-chevron-down" style="font-size: 0.75rem; color: var(--sf-text-secondary);"></i>
                </div>
                <div class="sf-dropdown-menu">
                    <div class="sf-dropdown-header">
                        <div style="font-weight: 600; color: var(--sf-navy);" sec:authentication="name">User</div>
                        <div style="font-size: 0.8125rem; color: var(--sf-text-secondary);">
                            <span sec:authorize="hasRole('ADMIN')">Admin</span>
                            <span sec:authorize="hasRole('SELLER')">Seller</span>
                            <span sec:authorize="hasRole('BUYER')">Buyer</span>
                        </div>
                    </div>
                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/users}" class="sf-dropdown-item">
                        <i class="fas fa-gauge-high"></i> Dashboard
                    </a>
                    <a sec:authorize="hasRole('SELLER')" th:href="@{/seller/products}" class="sf-dropdown-item">
                        <i class="fas fa-gauge-high"></i> Dashboard
                    </a>
                    <a th:href="@{/profile}" class="sf-dropdown-item">
                        <i class="fas fa-user-circle"></i> Profile
                    </a>
                    <a sec:authorize="hasRole('BUYER')" th:href="@{/buyer/orders}" class="sf-dropdown-item">
                        <i class="fas fa-box-open"></i> My Orders
                    </a>
                    <a sec:authorize="hasRole('BUYER')" th:href="@{/buyer/cart}" class="sf-dropdown-item">
                        <i class="fas fa-shopping-cart"></i> Shopping Cart
                    </a>
                    <div style="border-top: 1px solid #e5e7eb; margin: 0.5rem 0;"></div>
                    <form th:action="@{/logout}" method="post" style="margin: 0;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="sf-dropdown-item" style="width: 100%; text-align: left;">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</nav>

</body>
</html>
