<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav class="navbar navbar-expand-lg border-bottom" th:fragment="navbar" style="background: white; padding: 16px 0;">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}" style="font-weight: 700; color: #4F46E5; font-size: 18px;">
            <i class="bi bi-shop"></i> ShopFlow
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" th:href="@{/login}" style="color: #6B7280; font-size: 14px;">Sign In</a>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="btn btn-primary btn-sm ms-2" th:href="@{/register}" style="color: white;">Create Account</a>
                </li>
                <li class="nav-item d-flex align-items-center ms-3" sec:authorize="isAuthenticated()">
                    <small sec:authentication="name" style="color: #111827; font-size: 13px;"></small>
                </li>
                <li class="nav-item ms-2" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" style="display: inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-outline-primary btn-sm">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
