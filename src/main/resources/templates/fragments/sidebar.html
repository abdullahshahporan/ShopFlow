<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!-- Unified Sidebar Fragment (Admin/Seller/Buyer) -->
<aside class="sf-sidebar" th:fragment="sidebar">
    <!-- Sidebar Header -->
    <div class="sf-sidebar-header">
        <a class="sf-sidebar-brand" th:href="@{/}">
            <i class="fas fa-store"></i>
            <span>ShopFlow</span>
        </a>
    </div>

    <!-- Sidebar Navigation -->
    <nav class="sf-sidebar-nav">
        <!-- Admin Menu -->
        <div sec:authorize="hasRole('ADMIN')" class="sf-nav-section">
            <div class="sf-nav-title">Admin</div>
            <a th:href="@{/admin/users}" class="sf-nav-link" th:classappend="${requestURI != null and requestURI.contains('/admin/users') ? 'active' : ''}">
                <i class="fas fa-users"></i>
                <span>Users</span>
            </a>
            <a th:href="@{/admin/sellers}" class="sf-nav-link" th:classappend="${requestURI != null and requestURI.contains('/admin/sellers') ? 'active' : ''}">
                <i class="fas fa-store"></i>
                <span>Sellers</span>
            </a>
        </div>
        
        <!-- Seller Menu -->
        <div sec:authorize="hasRole('SELLER')" class="sf-nav-section">
            <div class="sf-nav-title">Seller</div>
            <a th:href="@{/seller/products}" class="sf-nav-link" th:classappend="${requestURI != null and requestURI.contains('/seller/products') and not requestURI.contains('/new') ? 'active' : ''}">
                <i class="fas fa-box"></i>
                <span>Products</span>
            </a>
            <a th:href="@{/seller/products/new}" class="sf-nav-link" th:classappend="${requestURI != null and requestURI.contains('/seller/products/new') ? 'active' : ''}">
                <i class="fas fa-plus-circle"></i>
                <span>Add Product</span>
            </a>
            <a th:href="@{/seller/orders}" class="sf-nav-link" th:classappend="${requestURI != null and requestURI.contains('/seller/orders') ? 'active' : ''}">
                <i class="fas fa-shopping-bag"></i>
                <span>Orders</span>
            </a>
        </div>
        
        <!-- Buyer Menu -->
        <div sec:authorize="hasRole('BUYER')" class="sf-nav-section">
            <div class="sf-nav-title">Buyer</div>
            <a th:href="@{/products}" class="sf-nav-link" th:classappend="${requestURI != null and requestURI == '/products' ? 'active' : ''}">
                <i class="fas fa-shopping-bag"></i>
                <span>Browse Products</span>
            </a>
            <a th:href="@{/buyer/cart}" class="sf-nav-link" th:classappend="${requestURI != null and requestURI.contains('/buyer/cart') ? 'active' : ''}">
                <i class="fas fa-shopping-cart"></i>
                <span>My Cart</span>
            </a>
            <a th:href="@{/buyer/orders}" class="sf-nav-link" th:classappend="${requestURI != null and requestURI.contains('/buyer/orders') ? 'active' : ''}">
                <i class="fas fa-box-open"></i>
                <span>My Orders</span>
            </a>
        </div>
        
        <!-- Common Links -->
        <div class="sf-nav-section">
            <div class="sf-nav-title">Account</div>
            <a th:href="@{/profile}" class="sf-nav-link" th:classappend="${requestURI != null and requestURI.contains('/profile') ? 'active' : ''}">
                <i class="fas fa-user-circle"></i>
                <span>My Profile</span>
            </a>
            <form th:action="@{/logout}" method="post" style="margin: 0; padding: 0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="sf-nav-link" style="width: 100%; text-align: left; border: none; background: transparent; color: #94a3b8; cursor: pointer;">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </form>
        </div>
    </nav>
</aside>

<!-- Alert Messages Fragment -->
<div th:fragment="alerts">
    <div th:if="${successMessage}" class="sf-alert sf-alert-success alert-autohide">
        <i class="fas fa-check-circle"></i>
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="sf-alert sf-alert-danger alert-autohide">
        <i class="fas fa-exclamation-triangle"></i>
        <span th:text="${errorMessage}"></span>
    </div>
    <div th:if="${warningMessage}" class="sf-alert sf-alert-warning alert-autohide">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${warningMessage}"></span>
    </div>
    <div th:if="${infoMessage}" class="sf-alert sf-alert-info alert-autohide">
        <i class="fas fa-info-circle"></i>
        <span th:text="${infoMessage}"></span>
    </div>
</div>

</body>
</html>
