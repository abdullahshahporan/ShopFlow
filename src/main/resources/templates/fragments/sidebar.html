<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<aside class="sidebar" th:fragment="sidebar">
    <div class="sidebar-logo">
        <i class="bi bi-shop"></i> ShopFlow
    </div>

    <nav class="sidebar-nav">
        <a th:href="@{/}" class="sidebar-nav-item">
            <i class="bi bi-house-door"></i>
            <span>Home</span>
        </a>

        <!-- Buyer Links -->
        <a sec:authorize="hasRole('BUYER')" th:href="@{/products}" class="sidebar-nav-item">
            <i class="bi bi-grid"></i>
            <span>Browse Products</span>
        </a>
        <a sec:authorize="hasRole('BUYER')" th:href="@{/buyer/orders}" class="sidebar-nav-item">
            <i class="bi bi-bag-check"></i>
            <span>My Orders</span>
        </a>

        <!-- Seller Links -->
        <a sec:authorize="hasRole('SELLER')" th:href="@{/products}" class="sidebar-nav-item">
            <i class="bi bi-grid"></i>
            <span>Browse Products</span>
        </a>
        <a sec:authorize="hasRole('SELLER')" th:href="@{/seller/products}" class="sidebar-nav-item">
            <i class="bi bi-box-seam"></i>
            <span>My Products</span>
        </a>
        <a sec:authorize="hasRole('SELLER')" th:href="@{/seller/products/new}" class="sidebar-nav-item">
            <i class="bi bi-plus-circle"></i>
            <span>Add Product</span>
        </a>

        <!-- Admin Links -->
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/products}" class="sidebar-nav-item">
            <i class="bi bi-grid"></i>
            <span>Browse Products</span>
        </a>
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/users}" class="sidebar-nav-item">
            <i class="bi bi-people"></i>
            <span>User Management</span>
        </a>
    </nav>

    <div class="sidebar-bottom">
        <div class="sidebar-user">
            <div class="user-avatar" th:text="${#authentication.principal.name.charAt(0).toUpperCase()}"></div>
            <div class="user-info">
                <div class="user-name" sec:authentication="name"></div>
                <div class="user-role" th:text="${#authentication.principal.getAuthorities()[0].getAuthority().replace('ROLE_', '')}"></div>
            </div>
        </div>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="logout-btn">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
            </button>
        </form>
    </div>
</aside>
</body>
</html>
