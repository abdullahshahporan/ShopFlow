<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart | ShopFlow</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body class="sidebar-layout">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <div class="sidebar-content">
        <div th:replace="~{fragments/topbar :: topbar('My Cart')}"></div>
        <main>
            <div class="alert-modern alert-success-modern" th:if="${successMessage != null}">
                <i class="bi bi-check-circle-fill"></i>
                <span th:text="${successMessage}"></span>
            </div>
            <div class="alert-modern alert-danger-modern" th:if="${errorMessage != null}">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-sm-6 col-xl-3">
                    <div class="card"><div class="card-body"><small class="text-muted">Items In Cart</small><h4 th:text="${cartItemCount}">0</h4></div></div>
                </div>
                <div class="col-sm-6 col-xl-3">
                    <div class="card"><div class="card-body"><small class="text-muted">Cart Total</small><h4 th:text="${'BDT ' + #numbers.formatDecimal(cartTotal, 1, 'COMMA', 2, 'POINT')}">BDT 0.00</h4></div></div>
                </div>
            </div>

            <div class="card" th:if="${cartLines != null and not #lists.isEmpty(cartLines)}">
                <div class="card-body">
                    <h3 style="margin-bottom: 24px;">Cart Products</h3>

                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                            <tr>
                                <th>Product</th>
                                <th>Price</th>
                                <th>Quantity</th>
                                <th>Subtotal</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="line : ${cartLines}">
                                <td>
                                    <strong th:text="${line.product.name}">Product</strong>
                                    <div><small class="text-muted" th:text="${'Seller: ' + line.product.sellerName}"></small></div>
                                </td>
                                <td th:text="${'BDT ' + #numbers.formatDecimal(line.product.price, 1, 'COMMA', 2, 'POINT')}">BDT 0.00</td>
                                <td>
                                    <div style="display: inline-flex; gap: 8px; align-items: center;">
                                        <form th:action="@{/buyer/cart/update}" method="post" style="display: inline;">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                            <input type="hidden" name="productId" th:value="${line.product.id}">
                                            <input type="hidden" name="action" value="dec">
                                            <button class="btn btn-outline-secondary btn-sm" type="submit">-</button>
                                        </form>
                                        <span style="min-width: 28px; text-align: center;" th:text="${line.qty}">1</span>
                                        <form th:action="@{/buyer/cart/update}" method="post" style="display: inline;">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                            <input type="hidden" name="productId" th:value="${line.product.id}">
                                            <input type="hidden" name="action" value="inc">
                                            <button class="btn btn-outline-secondary btn-sm" type="submit">+</button>
                                        </form>
                                    </div>
                                </td>
                                <td th:text="${'BDT ' + #numbers.formatDecimal(line.subtotal, 1, 'COMMA', 2, 'POINT')}">BDT 0.00</td>
                                <td>
                                    <form th:action="@{/buyer/cart/remove}" method="post" style="display: inline;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <input type="hidden" name="productId" th:value="${line.product.id}">
                                        <button class="btn btn-outline-danger btn-sm" type="submit"><i class="bi bi-trash"></i> Remove</button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                        <a th:href="@{/}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Continue Shopping</a>
                        <form th:action="@{/buyer/cart/checkout}" method="post" style="margin: 0; display: flex; gap: 10px; align-items: center;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <select name="paymentMethod" class="form-select" style="min-width: 170px;" required>
                                <option value="">Select Payment</option>
                                <option value="COD">COD</option>
                                <option value="BKASH">Bkash</option>
                                <option value="NAGAD">Nagad</option>
                                <option value="CARD">Card</option>
                            </select>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-check2-circle"></i> Place Order</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="empty-state card" th:if="${cartLines == null or #lists.isEmpty(cartLines)}">
                <div class="card-body">
                    <i class="bi bi-cart-x" style="font-size: 42px;"></i>
                    <h5>Your cart is empty</h5>
                    <p class="text-muted">Add products from Home and they will appear here.</p>
                    <a th:href="@{/}" class="btn btn-primary btn-sm"><i class="bi bi-house"></i> Go Home</a>
                </div>
            </div>
        </main>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
