<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    <title>Order Details | ShopFlow</title>
</head>
<body>
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <div class="sf-main-content">
        <nav th:replace="~{fragments/navbar :: navbar(pageTitle='Order Details')}"></nav>
        
        <div class="container-fluid p-4">
            <!-- Order Summary Card -->
            <div class="sf-card mb-4" style="background: linear-gradient(135deg, #f8fafc 0%, #e5e7eb 100%);">
                <div class="sf-card-body">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 class="mb-0">
                            <i class="fas fa-receipt me-2"></i>Order Summary
                        </h3>
                        <span class="sf-badge sf-badge-warning" th:text="${order.status}">Status</span>
                    </div>
                    
                    <div class="row g-4">
                        <div class="col-md-4 col-6">
                            <small class="text-muted text-uppercase d-block mb-1" style="font-size: 0.75rem; letter-spacing: 0.5px;">Order ID</small>
                            <div style="font-size: 1.5rem; font-weight: 700; color: var(--sf-primary);">
                                #<span th:text="${order.id}">0</span>
                            </div>
                        </div>
                        <div class="col-md-4 col-6">
                            <small class="text-muted text-uppercase d-block mb-1" style="font-size: 0.75rem; letter-spacing: 0.5px;">Order Date</small>
                            <div style="font-size: 1rem; font-weight: 600;" th:text="${#temporals.format(order.createdAt, 'MMM dd, yyyy | hh:mm a')}">Date</div>
                        </div>
                        <div class="col-md-4 col-6">
                            <small class="text-muted text-uppercase d-block mb-1" style="font-size: 0.75rem; letter-spacing: 0.5px;">Payment Method</small>
                            <div style="font-size: 1rem; font-weight: 600;">
                                <i class="fas fa-wallet me-1"></i>
                                <span th:text="${order.paymentMethod}">COD</span>
                            </div>
                        </div>
                        <div class="col-md-4 col-6">
                            <small class="text-muted text-uppercase d-block mb-1" style="font-size: 0.75rem; letter-spacing: 0.5px;">Payment Status</small>
                            <div style="font-size: 1rem; font-weight: 600;" th:text="${order.paymentStatus}">PENDING</div>
                        </div>
                        <div class="col-md-4 col-6">
                            <small class="text-muted text-uppercase d-block mb-1" style="font-size: 0.75rem; letter-spacing: 0.5px;">Order Total</small>
                            <div style="font-size: 1.75rem; font-weight: 700; color: var(--sf-success);" th:text="'BDT ' + ${#numbers.formatDecimal(order.total, 1, 'COMMA', 2, 'POINT')}">BDT 0.00</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Items Table -->
            <div class="sf-card">
                <div class="sf-card-body">
                    <h3 class="mb-4">
                        <i class="fas fa-shopping-bag me-2"></i>Order Items
                    </h3>

                    <div class="table-responsive">
                        <table class="sf-table">
                            <thead>
                                <tr>
                                    <th>Product</th>
                                    <th>Quantity</th>
                                    <th>Unit Price</th>
                                    <th class="text-end">Subtotal</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${order.items}">
                                    <td>
                                        <div class="d-flex align-items-center gap-3">
                                            <img th:if="${item.imageUrl != null and !item.imageUrl.isEmpty()}" 
                                                 th:src="${item.imageUrl}" 
                                                 alt="Product"
                                                 class="sf-product-thumb"
                                                 th:onerror="'this.src=\'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=120&h=120&fit=crop&seed=' + ${item.productId} + '\''">
                                            <img th:if="${item.imageUrl == null or item.imageUrl.isEmpty()}" 
                                                 th:src="'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=120&h=120&fit=crop&seed=' + ${item.productId}" 
                                                 alt="Product"
                                                 class="sf-product-thumb"
                                                 onerror="this.src='https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=120&h=120&fit=crop'">
                                            <strong th:text="${item.productName}">Product</strong>
                                        </div>
                                    </td>
                                    <td>
                                        <span class="sf-badge sf-badge-info">
                                            <i class="fas fa-boxes me-1"></i>
                                            <span th:text="${item.qty}">0</span> units
                                        </span>
                                    </td>
                                    <td>
                                        <strong th:text="'BDT ' + ${#numbers.formatDecimal(item.unitPrice, 1, 'COMMA', 2, 'POINT')}">BDT 0</strong>
                                    </td>
                                    <td class="text-end">
                                        <strong style="color: var(--sf-primary); font-size: 1rem;" th:text="'BDT ' + ${#numbers.formatDecimal(item.subtotal, 1, 'COMMA', 2, 'POINT')}">BDT 0</strong>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Total Summary -->
                    <div class="mt-4 p-4" style="background: linear-gradient(135deg, #f8fafc 0%, #e5e7eb 100%); border-radius: 12px;">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="text-muted">Subtotal</span>
                            <strong th:text="'BDT ' + ${#numbers.formatDecimal(order.total, 1, 'COMMA', 2, 'POINT')}">BDT 0</strong>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="text-muted">Shipping</span>
                            <strong style="color: var(--sf-success);">FREE</strong>
                        </div>
                        <hr style="margin: 16px 0 24px;">
                        <div class="d-flex justify-content-between align-items-center">
                            <strong style="font-size: 1.25rem;">Grand Total</strong>
                            <strong style="font-size: 2rem; font-weight: 700; color: var(--sf-primary);" th:text="'BDT ' + ${#numbers.formatDecimal(order.total, 1, 'COMMA', 2, 'POINT')}">BDT 0.00</strong>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="mt-4">
                <a th:href="@{/buyer/orders}" class="btn sf-btn-secondary">
                    <i class="fas fa-arrow-left me-2"></i>Back to Orders
                </a>
                <form th:if="${order.status == 'PENDING'}"
                      th:action="@{/buyer/orders/{id}/cancel(id=${order.id})}"
                      method="post"
                      style="display: inline-block; margin-left: 12px;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="reason" value="Cancelled by buyer before seller approval">
                    <button type="submit" class="btn sf-btn-danger-outline"
                            onclick="return confirm('Cancel this order? This is allowed only before seller approval.');">
                        <i class="fas fa-times-circle me-2"></i>Cancel Order
                    </button>
                </form>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script th:src="@{/js/shopflow.js}"></script>
</body>
</html>
