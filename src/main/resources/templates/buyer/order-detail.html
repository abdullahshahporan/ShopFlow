<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="py-4">
    <div class="container">
        <h2>Order Detail</h2>
        <hr>

        <div class="card mb-3">
            <div class="card-body">
                <p class="mb-1"><strong>Order ID:</strong> <span th:text="${order.id}"></span></p>
                <p class="mb-1"><strong>Date:</strong> <span th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></span></p>
                <p class="mb-1"><strong>Status:</strong> <span th:text="${order.status}"></span></p>
                <p class="mb-0"><strong>Total:</strong> <span th:text="${#numbers.formatDecimal(order.total, 1, 2)}"></span></p>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Unit Price</th>
                    <th>Subtotal</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${order.items}">
                    <td th:text="${item.productName}"></td>
                    <td th:text="${item.qty}"></td>
                    <td th:text="${#numbers.formatDecimal(item.unitPrice, 1, 2)}"></td>
                    <td th:text="${#numbers.formatDecimal(item.subtotal, 1, 2)}"></td>
                </tr>
                </tbody>
            </table>
        </div>

        <a class="btn btn-secondary" th:href="@{/buyer/orders}">Back to Orders</a>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
