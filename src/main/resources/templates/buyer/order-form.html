<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    <title>Place Order | ShopFlow</title>
</head>
<body>
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <div class="sf-main-content">
        <nav th:replace="~{fragments/navbar :: navbar(pageTitle='Place New Order')}"></nav>
        
        <div class="container-fluid p-4">
            <div class="sf-alert sf-alert-danger sf-alert-dismissible" th:if="${errorMessage}">
                <i class="fas fa-exclamation-triangle"></i>
                <span th:text="${errorMessage}"></span>
                <button type="button" class="sf-alert-close">&times;</button>
            </div>

            <div class="sf-card">
                <div class="sf-card-body">
                    <h3 class="mb-2">
                        <i class="fas fa-shopping-bag me-2"></i>Available Products
                    </h3>
                    <p class="text-muted mb-4">Select products and quantities to create your order</p>

                    <form th:action="@{/buyer/orders}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-4" style="max-width: 400px;">
                            <label for="paymentMethod" class="form-label">
                                <i class="fas fa-wallet me-2"></i>Payment Method
                            </label>
                            <select id="paymentMethod" name="paymentMethod" class="form-select sf-form-control" required>
                                <option value="">Select Payment Method</option>
                                <option value="COD">Cash on Delivery (COD)</option>
                                <option value="BKASH">bKash Mobile Banking</option>
                                <option value="NAGAD">Nagad Mobile Banking</option>
                                <option value="CARD">Credit/Debit Card</option>
                            </select>
                        </div>

                        <div class="table-responsive">
                            <table class="sf-table">
                                <thead>
                                    <tr>
                                        <th>Product</th>
                                        <th>SKU</th>
                                        <th>Price</th>
                                        <th>Available</th>
                                        <th style="width: 150px;">Order Qty</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="product : ${products}" th:classappend="${product.quantity == 0 ? 'opacity-50' : ''}">
                                        <td>
                                            <div class="d-flex align-items-center gap-3">
                                                <img th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}" 
                                                     th:src="${product.imageUrl}" 
                                                     alt="Product"
                                                     class="sf-product-thumb"
                                                     th:onerror="'this.src=\'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=120&h=120&fit=crop&seed=' + ${product.id} + '\''">
                                                <img th:if="${product.imageUrl == null or product.imageUrl.isEmpty()}" 
                                                     th:src="'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=120&h=120&fit=crop&seed=' + ${product.id}" 
                                                     alt="Product"
                                                     class="sf-product-thumb"
                                                     onerror="this.src='https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=120&h=120&fit=crop'">
                                                <strong th:text="${product.name}">Product</strong>
                                            </div>
                                        </td>
                                        <td>
                                            <span class="sf-sku-badge" th:text="${product.sku}">SKU</span>
                                        </td>
                                        <td>
                                            <strong th:text="'BDT ' + ${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}">BDT 0</strong>
                                        </td>
                                        <td>
                                            <span th:if="${product.quantity > 10}" class="sf-badge sf-badge-success">
                                                <i class="fas fa-check-circle me-1"></i>
                                                <span th:text="${product.quantity}">0</span> in stock
                                            </span>
                                            <span th:if="${product.quantity > 0 and product.quantity <= 10}" class="sf-badge sf-badge-warning">
                                                <i class="fas fa-exclamation-triangle me-1"></i>
                                                Only <span th:text="${product.quantity}">0</span> left
                                            </span>
                                            <span th:if="${product.quantity == 0}" class="sf-badge sf-badge-danger">
                                                <i class="fas fa-times-circle me-1"></i>Out of Stock
                                            </span>
                                        </td>
                                        <td>
                                            <input type="hidden" name="productId" th:value="${product.id}">
                                            <input type="number" 
                                                   class="form-control sf-form-control" 
                                                   name="qty" 
                                                   min="0" 
                                                   th:attr="max=${product.quantity}" 
                                                   th:disabled="${product.quantity == 0}" 
                                                   value="0" 
                                                   placeholder="0" 
                                                   style="text-align: center; font-weight: 600;">
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="d-flex justify-content-between gap-3 pt-4 mt-4" style="border-top: 1px solid var(--sf-border);">
                            <a th:href="@{/buyer/orders}" class="btn sf-btn-secondary">
                                <i class="fas fa-times me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn sf-btn-primary btn-lg">
                                <i class="fas fa-check-circle me-2"></i>Submit Order
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script th:src="@{/js/shopflow.js}"></script>
</body>
</html>
