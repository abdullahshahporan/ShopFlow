<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Order | ShopFlow</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body class="sidebar-layout">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <div class="sidebar-content">
        <div th:replace="~{fragments/topbar :: topbar('Place New Order')}"></div>
        <main>
            <div class="alert-modern alert-danger-modern" th:if="${errorMessage}">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <div class="card">
                <div class="card-body">
                    <h3 style="margin-bottom: 24px;">Available Products</h3>

                    <form th:action="@{/buyer/orders}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                <tr>
                                    <th>Product</th>
                                    <th>SKU</th>
                                    <th>Price</th>
                                    <th>Available</th>
                                    <th>Order Qty</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="product : ${products}" th:classappend="${product.quantity == 0} ? 'table-light' : ''">
                                    <td>
                                        <strong th:text="${product.name}"></strong>
                                    </td>
                                    <td><code style="background: var(--bg-base); padding: 2px 6px; border-radius: 4px; font-size: 12px;" th:text="${product.sku}"></code></td>
                                    <td th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}"></td>
                                    <td>
                                        <span th:if="${product.quantity > 0}" th:text="${product.quantity} + ' left'"></span>
                                        <span th:if="${product.quantity == 0}" class="badge" style="background: #FEE2E2; color: #991B1B;">Out of Stock</span>
                                    </td>
                                    <td>
                                        <input type="hidden" name="productId" th:value="${product.id}">
                                        <input type="number" class="form-control" style="width: 80px;" name="qty" min="0" th:attr="max=${product.quantity}" th:disabled="${product.quantity == 0}" value="0" placeholder="0">
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                        <div style="display: flex; gap: 12px; padding-top: 16px; border-top: 1px solid var(--border);">
                            <a th:href="@{/buyer/orders}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> Submit Order
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-dismiss alerts
        document.querySelectorAll('.alert-modern').forEach(alert => {
            setTimeout(() => {
                alert.style.opacity = '0';
                setTimeout(() => alert.remove(), 300);
            }, 4000);
        });
    </script>
</body>
</html>
