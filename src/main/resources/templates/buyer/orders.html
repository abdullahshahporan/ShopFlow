<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | ShopFlow</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body>
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <div class="sf-main-content">
        <nav th:replace="~{fragments/navbar :: navbar(pageTitle='My Orders')}"></nav>
        <div class="sf-page-content">
            <!-- Alert Messages -->
            <div th:replace="~{fragments/sidebar :: alerts}"></div>

            <!-- Stat Cards -->
            <div class="row g-3 mb-4">
                <div class="col-lg-6 col-md-6">
                    <div class="sf-stat-card">
                        <div class="sf-stat-icon" style="background: linear-gradient(135deg, var(--sf-primary) 0%, #8b7cff 100%);">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <div class="sf-stat-content">
                            <div class="sf-stat-label">Total Orders</div>
                            <div class="sf-stat-value" th:text="${orders != null ? orders.size() : 0}">0</div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6 col-md-6">
                    <div class="sf-stat-card">
                        <div class="sf-stat-icon" style="background: linear-gradient(135deg, var(--sf-success) 0%, #4ade80 100%);">
                            <i class="fas fa-dollar-sign"></i>
                        </div>
                        <div class="sf-stat-content">
                            <div class="sf-stat-label">Total Spent</div>
                            <div class="sf-stat-value" th:text="'BDT ' + ${#numbers.formatDecimal(totalSpent, 1, 2)}">BDT 0</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Orders Table Card -->
            <div class="sf-card">
                <div class="sf-card-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h5 class="sf-card-title"><i class="fas fa-list"></i> Order History</h5>
                    <a th:href="@{/buyer/orders/new}" class="btn sf-btn-primary btn-sm">
                        <i class="fas fa-plus-circle"></i> Place Order
                    </a>
                </div>
                <div class="sf-card-body">
                    <div th:if="${orders != null and not #lists.isEmpty(orders)}" class="sf-table-container">
                        <table class="sf-table">
                            <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Date</th>
                                <th>Items</th>
                                <th>Payment</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="order : ${orders}">
                                <td><strong style="color: var(--sf-primary);">#<span th:text="${order.id}"></span></strong></td>
                                <td><small th:text="${order.createdAt != null ? #temporals.format(order.createdAt, 'MMM dd, yyyy') : '-'}"></small></td>
                                <td th:with="cnt=${order.items != null ? #lists.size(order.items) : 0}" th:text="${cnt} + ' item' + (${cnt != 1} ? 's' : '')"></td>
                                <td>
                                    <div><small th:text="${order.paymentMethod}"></small></div>
                                    <div><small class="text-muted" th:text="${order.paymentStatus}"></small></div>
                                </td>
                                <td><strong th:text="'BDT ' + ${#numbers.formatDecimal(order.total != null ? order.total : 0, 1, 2)}"></strong></td>
                                <td>
                                    <span class="sf-badge"
                                          th:classappend="${order.status == 'PENDING' ? ' sf-badge-warning' :
                                                         order.status == 'APPROVED' ? ' sf-badge-info' :
                                                         order.status == 'ON_THE_WAY' ? ' sf-badge-primary' :
                                                         order.status == 'DELIVERED' ? ' sf-badge-success' :
                                                         order.status == 'FAILED' ? ' sf-badge-danger' : ' sf-badge-secondary'}"
                                          th:text="${order.status}">Status</span>
                                </td>
                                <td>
                                    <a th:href="@{/buyer/orders/{id}(id=${order.id})}" class="btn sf-btn-primary-outline btn-sm">
                                        <i class="fas fa-eye"></i> View
                                    </a>
                                    <form th:if="${order.status == 'PENDING'}"
                                          th:action="@{/buyer/orders/{id}/cancel(id=${order.id})}"
                                          method="post"
                                          style="display: inline-block; margin-left: 6px;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <input type="hidden" name="reason" value="Cancelled by buyer before seller approval">
                                        <button type="submit" class="btn sf-btn-danger-outline btn-sm"
                                                onclick="return confirm('Cancel this order? This is allowed only before seller approval.');">
                                            <i class="fas fa-times-circle"></i> Cancel
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div th:if="${orders == null or #lists.isEmpty(orders)}" class="sf-empty-state">
                        <div class="sf-empty-icon">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <h5 class="sf-empty-title">No Orders Yet</h5>
                        <p class="sf-empty-text">Start shopping to place your first order.</p>
                        <a th:href="@{/}" class="btn sf-btn-primary btn-sm">
                            <i class="fas fa-shopping-bag"></i> Browse Products
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
    <script th:src="@{/js/shopflow.js}"></script>
</body>
</html>
