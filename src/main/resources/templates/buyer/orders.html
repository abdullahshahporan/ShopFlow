<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | ShopFlow</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body class="sidebar-layout">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <div class="sidebar-content">
        <div th:replace="~{fragments/topbar :: topbar('My Orders')}"></div>
        <main>
            <div class="alert-modern alert-success-modern" th:if="${successMessage}">
                <i class="bi bi-check-circle-fill"></i>
                <span th:text="${successMessage}"></span>
            </div>
            <div class="alert-modern alert-danger-modern" th:if="${errorMessage}">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${errorMessage}"></span>
            </div>

            <!-- Stat Cards -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px;">
                <div class="stat-card">
                    <div class="stat-icon bg-indigo-soft">
                        <i class="bi bi-bag-check"></i>
                    </div>
                    <div>
                        <div class="stat-value" th:text="${orders != null ? orders.size() : 0}">0</div>
                        <div class="stat-label">Total Orders</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-indigo-soft">
                        <i class="bi bi-currency-dollar"></i>
                    </div>
                    <div>
                        <div class="stat-value" th:text="'$' + ${#numbers.formatDecimal(totalSpent, 1, 2)}">$0</div>
                        <div class="stat-label">Total Spent</div>
                    </div>
                </div>
            </div>

            <!-- Orders Table Card -->
            <div class="card">
                <div class="card-body">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                        <h3 style="margin: 0;">Order History</h3>
                        <a th:href="@{/buyer/orders/new}" class="btn btn-primary btn-sm">
                            <i class="bi bi-plus-circle"></i> Place Order
                        </a>
                    </div>

                    <div th:if="${orders != null and not #lists.isEmpty(orders)}" class="table-responsive">
                        <table class="table">
                            <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Date</th>
                                <th>Items</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="order : ${orders}">
                                <td><strong style="color: var(--primary);">#<span th:text="${order.id}"></span></strong></td>
                                <td><small th:text="${order.createdAt != null ? #temporals.format(order.createdAt, 'MMM dd, yyyy') : '-'}"></small></td>
                                <td th:text="${#lists.size(order.items)} + ' item' + (${#lists.size(order.items) != 1} ? 's' : '')"></td>
                                <td><strong th:text="'$' + ${#numbers.formatDecimal(order.total, 1, 2)}"></strong></td>
                                <td><span class="badge badge-warning" style="background: #FEF3C7; color: #92400E;" th:text="${order.status}"></span></td>
                                <td>
                                    <a th:href="@{/buyer/orders/{id}(id=${order.id})}" class="btn btn-outline-primary btn-sm">
                                        <i class="bi bi-eye"></i> View
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div th:if="${orders == null or #lists.isEmpty(orders)}" class="empty-state">
                        <i class="bi bi-bag-x"></i>
                        <h5>No Orders Yet</h5>
                        <p class="text-muted">Start shopping to place your first order.</p>
                        <a th:href="@{/products}" class="btn btn-primary btn-sm">
                            <i class="bi bi-grid"></i> Browse Products
                        </a>
                    </div>
                </div>
            </div>
        </main>
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-dismiss alerts
        document.querySelectorAll('.alert-modern').forEach(alert => {
            setTimeout(() => {
                alert.style.opacity = '0';
                setTimeout(() => alert.remove(), 300);
            }, 4000);
        });
    </script>
</body>
</html>
