spring.application.name=SWE_Project

# ?? Database (PostgreSQL / NeonDB) ??
# Require SSL mode by default; production Neon URL should still be supplied via SPRING_DATASOURCE_URL.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mydatabase?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:myuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA / Hibernate ??
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ?? Thymeleaf ??
spring.thymeleaf.cache=false

# ?? Docker Compose ??
spring.docker.compose.enabled=false

